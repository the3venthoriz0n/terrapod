# gitleaks configuration for Terrapod
# https://github.com/gitleaks/gitleaks

title = "Terrapod gitleaks config"

[allowlist]
  description = "Allowlisted paths and patterns"
  paths = [
    # Test fixtures may contain fake secrets
    '''services/tests/''',
    # Pen test rules reference secret patterns
    '''pentest/''',
    # Lock files
    '''poetry\.lock''',
    '''package-lock\.json''',
    # Alembic migrations (revision hashes look like secrets)
    '''alembic/versions/''',
  ]
