{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "terrapod.fullname" . }}-web
  labels:
    {{- include "terrapod.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  {{- if not .Values.web.autoscaling.enabled }}
  replicas: {{ .Values.web.replicas }}
  {{- end }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.web.strategy.maxSurge }}
      maxUnavailable: {{ .Values.web.strategy.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "terrapod.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if or .Values.api.config.metrics.enabled .Values.web.podAnnotations }}
      annotations:
        {{- if .Values.api.config.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- with .Values.web.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      labels:
        {{- include "terrapod.web.selectorLabels" . | nindent 8 }}
        {{- with .Values.web.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "terrapod.webServiceAccountName" . }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.web.terminationGracePeriodSeconds }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.extraInitContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "terrapod.web.image" . }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            {{- if .Values.api.config.metrics.enabled }}
            - name: metrics
              containerPort: 9091
              protocol: TCP
            {{- end }}
          env:
            - name: API_URL
              value: "http://{{ include "terrapod.fullname" . }}-api:8000"
            {{- with .Values.web.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.web.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: {{ hasKey .Values.web.startupProbe "failureThreshold" | ternary .Values.web.startupProbe.failureThreshold 30 }}
            periodSeconds: {{ hasKey .Values.web.startupProbe "periodSeconds" | ternary .Values.web.startupProbe.periodSeconds 2 }}
            timeoutSeconds: {{ hasKey .Values.web.startupProbe "timeoutSeconds" | ternary .Values.web.startupProbe.timeoutSeconds 1 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: {{ hasKey .Values.web.livenessProbe "initialDelaySeconds" | ternary .Values.web.livenessProbe.initialDelaySeconds 10 }}
            periodSeconds: {{ hasKey .Values.web.livenessProbe "periodSeconds" | ternary .Values.web.livenessProbe.periodSeconds 10 }}
            timeoutSeconds: {{ hasKey .Values.web.livenessProbe "timeoutSeconds" | ternary .Values.web.livenessProbe.timeoutSeconds 1 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: {{ hasKey .Values.web.readinessProbe "initialDelaySeconds" | ternary .Values.web.readinessProbe.initialDelaySeconds 5 }}
            periodSeconds: {{ hasKey .Values.web.readinessProbe "periodSeconds" | ternary .Values.web.readinessProbe.periodSeconds 5 }}
            timeoutSeconds: {{ hasKey .Values.web.readinessProbe "timeoutSeconds" | ternary .Values.web.readinessProbe.timeoutSeconds 1 }}
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "{{ .Values.web.preStopSleepSeconds | default 30 }}"]
          {{- with .Values.web.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          {{- with .Values.web.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.web.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.web.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "terrapod.podAntiAffinity" (dict "enabled" .Values.web.podAntiAffinity.enabled "affinity" .Values.web.affinity "labels" (include "terrapod.web.selectorLabels" .)) }}
      {{- if .Values.web.priorityClassName }}
      priorityClassName: {{ .Values.web.priorityClassName | quote }}
      {{- end }}
      {{- with .Values.web.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
