{{- if and .Values.api.config.metrics.enabled .Values.api.config.metrics.podMonitor.enabled .Values.listener.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "terrapod.fullname" . }}-listener
  labels:
    {{- include "terrapod.labels" . | nindent 4 }}
    app.kubernetes.io/component: listener
    {{- with .Values.api.config.metrics.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "terrapod.listener.selectorLabels" . | nindent 6 }}
  podMetricsEndpoints:
    - port: health
      path: /metrics
      interval: {{ .Values.api.config.metrics.podMonitor.interval | default "30s" }}
{{- end }}
