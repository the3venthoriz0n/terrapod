{{- if ne .Values.api.enabled false }}
{{- include "terrapod.validateStorageConfig" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "terrapod.fullname" . }}-api-config
  labels:
    {{- include "terrapod.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
data:
  config.yaml: |
    log_level: {{ .Values.api.config.log_level | quote }}
    {{- if hasKey .Values.api.config "debug" }}
    debug: {{ .Values.api.config.debug }}
    {{- end }}
    {{- if hasKey .Values.api.config "json_logs" }}
    json_logs: {{ .Values.api.config.json_logs }}
    {{- end }}
    {{- if .Values.api.config.external_url }}
    external_url: {{ .Values.api.config.external_url | quote }}
    {{- end }}
    {{- /*
      public_webhook_url priority:
        1. explicit api.config.public_webhook_url (operator override wins)
        2. webhookIngress.hostname when webhookIngress.enabled
           (auto-derived from the split-surface ingress)
        3. omit (server-side falls back to external_url for webhook URLs)
    */}}
    {{- $publicWebhookURL := .Values.api.config.public_webhook_url }}
    {{- if not $publicWebhookURL }}
    {{- $publicWebhookURL = include "terrapod.publicWebhookURL" . }}
    {{- end }}
    {{- if $publicWebhookURL }}
    public_webhook_url: {{ $publicWebhookURL | quote }}
    {{- end }}
    {{- if .Values.api.config.database }}
    database:
      pool_size: {{ .Values.api.config.database.pool_size | default 10 }}
      max_overflow: {{ .Values.api.config.database.max_overflow | default 20 }}
      pool_pre_ping: {{ .Values.api.config.database.pool_pre_ping | default true }}
      pool_recycle: {{ .Values.api.config.database.pool_recycle | default 1800 }}
      pool_timeout: {{ .Values.api.config.database.pool_timeout | default 30 }}
      connect_timeout: {{ .Values.api.config.database.connect_timeout | default 10 }}
      command_timeout: {{ .Values.api.config.database.command_timeout | default 30 }}
      auth_mode: {{ .Values.api.config.database.auth_mode | default "password" | quote }}
      aws_iam_region: {{ .Values.api.config.database.aws_iam_region | default "" | quote }}
      ssl_mode: {{ .Values.api.config.database.ssl_mode | default "" | quote }}
      {{- if or .Values.api.databaseCA.inline .Values.api.databaseCA.existingConfigMap }}
      ssl_root_cert: {{ printf "/etc/terrapod/db-ca/%s" (.Values.api.databaseCA.key | default "ca.pem") | quote }}
      {{- else }}
      ssl_root_cert: {{ .Values.api.config.database.ssl_root_cert | default "" | quote }}
      {{- end }}
    {{- end }}
    {{- if .Values.api.config.redis }}
    redis:
      auth_mode: {{ .Values.api.config.redis.auth_mode | default "password" | quote }}
      username: {{ .Values.api.config.redis.username | default "" | quote }}
      aws_iam_region: {{ .Values.api.config.redis.aws_iam_region | default "" | quote }}
      aws_cache_name: {{ .Values.api.config.redis.aws_cache_name | default "" | quote }}
    {{- end }}
    storage:
      backend: {{ .Values.api.config.storage.backend | quote }}
      {{- if eq .Values.api.config.storage.backend "s3" }}
      s3:
        bucket: {{ .Values.api.config.storage.s3.bucket | quote }}
        region: {{ .Values.api.config.storage.s3.region | quote }}
        {{- if .Values.api.config.storage.s3.prefix }}
        prefix: {{ .Values.api.config.storage.s3.prefix | quote }}
        {{- end }}
        {{- if .Values.api.config.storage.s3.endpoint_url }}
        endpoint_url: {{ .Values.api.config.storage.s3.endpoint_url | quote }}
        {{- end }}
        presigned_url_expiry_seconds: {{ .Values.api.config.storage.s3.presigned_url_expiry_seconds }}
      {{- end }}
      {{- if eq .Values.api.config.storage.backend "azure" }}
      azure:
        account_name: {{ .Values.api.config.storage.azure.account_name | quote }}
        container_name: {{ .Values.api.config.storage.azure.container_name | quote }}
        {{- if .Values.api.config.storage.azure.prefix }}
        prefix: {{ .Values.api.config.storage.azure.prefix | quote }}
        {{- end }}
        presigned_url_expiry_seconds: {{ .Values.api.config.storage.azure.presigned_url_expiry_seconds }}
      {{- end }}
      {{- if eq .Values.api.config.storage.backend "gcs" }}
      gcs:
        bucket: {{ .Values.api.config.storage.gcs.bucket | quote }}
        {{- if .Values.api.config.storage.gcs.prefix }}
        prefix: {{ .Values.api.config.storage.gcs.prefix | quote }}
        {{- end }}
        {{- if .Values.api.config.storage.gcs.project_id }}
        project_id: {{ .Values.api.config.storage.gcs.project_id | quote }}
        {{- end }}
        {{- if .Values.api.config.storage.gcs.service_account_email }}
        service_account_email: {{ .Values.api.config.storage.gcs.service_account_email | quote }}
        {{- end }}
        presigned_url_expiry_seconds: {{ .Values.api.config.storage.gcs.presigned_url_expiry_seconds }}
      {{- end }}
      {{- if eq .Values.api.config.storage.backend "filesystem" }}
      filesystem:
        root_dir: {{ .Values.api.config.storage.filesystem.root_dir | quote }}
        presigned_url_expiry_seconds: {{ .Values.api.config.storage.filesystem.presigned_url_expiry_seconds }}
        {{- if .Values.api.config.storage.filesystem.base_url }}
        base_url: {{ .Values.api.config.storage.filesystem.base_url | quote }}
        {{- end }}
      {{- end }}
    {{- if .Values.api.config.auth }}
    auth:
      local_enabled: {{ .Values.api.config.auth.local_enabled }}
      {{- if .Values.api.config.auth.callback_base_url }}
      callback_base_url: {{ .Values.api.config.auth.callback_base_url | quote }}
      {{- end }}
      session_ttl_hours: {{ .Values.api.config.auth.session_ttl_hours | default 12 }}
      api_token_max_ttl_hours: {{ .Values.api.config.auth.api_token_max_ttl_hours | default 8760 }}
      {{- /* Rendered directly (no `| default`): 0 is meaningful for these and
             Helm's `default` would silently rewrite a configured 0 to the default. */}}
      login_token_ttl_hours: {{ .Values.api.config.auth.login_token_ttl_hours }}
      service_token_max_ttl_hours: {{ .Values.api.config.auth.service_token_max_ttl_hours }}
      token_expiry_warning_days: {{ .Values.api.config.auth.token_expiry_warning_days }}
      bound_token_idle_days: {{ .Values.api.config.auth.bound_token_idle_days }}
      {{- if .Values.api.config.auth.require_external_sso_for_roles }}
      require_external_sso_for_roles:
        {{- range .Values.api.config.auth.require_external_sso_for_roles }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- if .Values.api.config.auth.sso }}
      sso:
        default_provider: {{ .Values.api.config.auth.sso.default_provider | default "" | quote }}
        {{- if .Values.api.config.auth.sso.oidc }}
        oidc:
          {{- range .Values.api.config.auth.sso.oidc }}
          - name: {{ .name | quote }}
            {{- if .display_name }}
            display_name: {{ .display_name | quote }}
            {{- end }}
            issuer_url: {{ .issuer_url | quote }}
            client_id: {{ .client_id | quote }}
            {{- if .scopes }}
            scopes:
              {{- range .scopes }}
              - {{ . | quote }}
              {{- end }}
            {{- end }}
            {{- if .audience }}
            audience: {{ .audience | quote }}
            {{- end }}
            {{- if .groups_claim }}
            groups_claim: {{ .groups_claim | quote }}
            {{- end }}
            {{- if .role_prefixes }}
            role_prefixes:
              {{- range .role_prefixes }}
              - {{ . | quote }}
              {{- end }}
            {{- end }}
            {{- if .claims_to_roles }}
            claims_to_roles:
              {{- toYaml .claims_to_roles | nindent 14 }}
            {{- end }}
          {{- end }}
        {{- end }}
        {{- if .Values.api.config.auth.sso.saml }}
        saml:
          {{- range .Values.api.config.auth.sso.saml }}
          - name: {{ .name | quote }}
            {{- if .display_name }}
            display_name: {{ .display_name | quote }}
            {{- end }}
            metadata_url: {{ .metadata_url | quote }}
            {{- if .entity_id }}
            entity_id: {{ .entity_id | quote }}
            {{- end }}
            {{- if .acs_url }}
            acs_url: {{ .acs_url | quote }}
            {{- end }}
            {{- if .role_prefixes }}
            role_prefixes:
              {{- range .role_prefixes }}
              - {{ . | quote }}
              {{- end }}
            {{- end }}
            {{- if .claims_to_roles }}
            claims_to_roles:
              {{- toYaml .claims_to_roles | nindent 14 }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
    {{- if .Values.api.config.registry }}
    registry:
      enabled: {{ .Values.api.config.registry.enabled }}
      {{- if hasKey .Values.api.config.registry "cache_only" }}
      cache_only: {{ .Values.api.config.registry.cache_only }}
      {{- end }}
      {{- if .Values.api.config.registry.provider_cache }}
      provider_cache:
        enabled: {{ .Values.api.config.registry.provider_cache.enabled }}
        {{- if .Values.api.config.registry.provider_cache.upstream_registries }}
        upstream_registries:
          {{- range .Values.api.config.registry.provider_cache.upstream_registries }}
          - {{ . | quote }}
          {{- end }}
        {{- end }}
        warm_on_first_request: {{ .Values.api.config.registry.provider_cache.warm_on_first_request }}
        {{- if .Values.api.config.registry.provider_cache.platforms }}
        platforms:
          {{- range .Values.api.config.registry.provider_cache.platforms }}
          - os: {{ .os | quote }}
            arch: {{ .arch | quote }}
          {{- end }}
        {{- end }}
        {{- if .Values.api.config.registry.provider_cache.verify }}
        verify: {{ .Values.api.config.registry.provider_cache.verify | quote }}
        {{- end }}
        {{- if hasKey .Values.api.config.registry.provider_cache "allow_unsigned" }}
        allow_unsigned: {{ .Values.api.config.registry.provider_cache.allow_unsigned }}
        {{- end }}
      {{- end }}
      {{- if .Values.api.config.registry.binary_cache }}
      binary_cache:
        enabled: {{ .Values.api.config.registry.binary_cache.enabled }}
        {{- if .Values.api.config.registry.binary_cache.terraform_mirror_url }}
        terraform_mirror_url: {{ .Values.api.config.registry.binary_cache.terraform_mirror_url | quote }}
        {{- end }}
        {{- if .Values.api.config.registry.binary_cache.tofu_mirror_url }}
        tofu_mirror_url: {{ .Values.api.config.registry.binary_cache.tofu_mirror_url | quote }}
        {{- end }}
        {{- if .Values.api.config.registry.binary_cache.terragrunt_mirror_url }}
        terragrunt_mirror_url: {{ .Values.api.config.registry.binary_cache.terragrunt_mirror_url | quote }}
        {{- end }}
        {{- if .Values.api.config.registry.binary_cache.terraform_version_index_url }}
        terraform_version_index_url: {{ .Values.api.config.registry.binary_cache.terraform_version_index_url | quote }}
        {{- end }}
        {{- if .Values.api.config.registry.binary_cache.tofu_version_index_url }}
        tofu_version_index_url: {{ .Values.api.config.registry.binary_cache.tofu_version_index_url | quote }}
        {{- end }}
        {{- if .Values.api.config.registry.binary_cache.terragrunt_version_index_url }}
        terragrunt_version_index_url: {{ .Values.api.config.registry.binary_cache.terragrunt_version_index_url | quote }}
        {{- end }}
        {{- if .Values.api.config.registry.binary_cache.allow_prerelease }}
        allow_prerelease: {{ .Values.api.config.registry.binary_cache.allow_prerelease | quote }}
        {{- end }}
        {{- if .Values.api.config.registry.binary_cache.verify }}
        verify: {{ .Values.api.config.registry.binary_cache.verify | quote }}
        {{- end }}
        {{- if .Values.api.config.registry.binary_cache.signing_keys }}
        signing_keys:
          {{- toYaml .Values.api.config.registry.binary_cache.signing_keys | nindent 10 }}
        {{- end }}
      {{- end }}
      {{- if .Values.api.config.registry.module_interface }}
      module_interface:
        enabled: {{ .Values.api.config.registry.module_interface.enabled }}
      {{- end }}
    {{- end }}
    {{- if .Values.api.config.catalog }}
    catalog:
      enabled: {{ .Values.api.config.catalog.enabled }}
    {{- end }}
    {{- if .Values.api.config.vcs }}
    vcs:
      enabled: {{ .Values.api.config.vcs.enabled }}
      poll_interval_seconds: {{ .Values.api.config.vcs.poll_interval_seconds | default 60 }}
      # tmpdir tracks the ephemeralStorage mountPath so the VCS poller writes
      # streamed tarballs onto the PVC, not pod memory. Override
      # api.config.vcs.tmpdir if you remount the PVC elsewhere.
      tmpdir: {{ .Values.api.config.vcs.tmpdir | default .Values.api.ephemeralStorage.mountPath | default "/var/lib/terrapod/tmp" | quote }}
      {{- with .Values.api.config.vcs.archive_cache_retention_days }}
      archive_cache_retention_days: {{ . }}
      {{- end }}
      {{- with .Values.api.config.vcs.tmpdir_min_free_bytes }}
      tmpdir_min_free_bytes: {{ . | int64 }}
      {{- end }}
    {{- end }}
    {{- if .Values.api.config.audit }}
    audit:
      retention_days: {{ .Values.api.config.audit.retention_days | default 90 }}
    {{- end }}
    {{- if .Values.api.config.agent_pools }}
    agent_pools:
      listener_cert_ttl_seconds: {{ .Values.api.config.agent_pools.listener_cert_ttl_seconds | default 3600 }}
      {{- with .Values.api.config.agent_pools.default_join_token_max_uses }}
      default_join_token_max_uses: {{ . }}
      {{- end }}
      {{- with .Values.api.config.agent_pools.default_join_token_ttl_seconds }}
      default_join_token_ttl_seconds: {{ . }}
      {{- end }}
    {{- end }}
    {{- if .Values.api.config.drift_detection }}
    drift_detection:
      enabled: {{ .Values.api.config.drift_detection.enabled }}
      poll_interval_seconds: {{ .Values.api.config.drift_detection.poll_interval_seconds | default 300 }}
      min_workspace_interval_seconds: {{ .Values.api.config.drift_detection.min_workspace_interval_seconds | default 3600 }}
    {{- end }}
    {{- if .Values.api.config.notifications }}
    notifications:
      enabled: {{ .Values.api.config.notifications.enabled }}
      delivery_timeout_seconds: {{ .Values.api.config.notifications.delivery_timeout_seconds | default 30 }}
      max_delivery_responses: {{ .Values.api.config.notifications.max_delivery_responses | default 10 }}
      {{- if .Values.api.config.notifications.smtp }}
      smtp:
        {{- if .Values.api.config.notifications.smtp.host }}
        host: {{ .Values.api.config.notifications.smtp.host | quote }}
        {{- end }}
        port: {{ .Values.api.config.notifications.smtp.port | default 587 }}
        {{- if .Values.api.config.notifications.smtp.username }}
        username: {{ .Values.api.config.notifications.smtp.username | quote }}
        {{- end }}
        from_address: {{ .Values.api.config.notifications.smtp.from_address | default "notifications@terrapod.local" | quote }}
        use_tls: {{ .Values.api.config.notifications.smtp.use_tls | default true }}
      {{- end }}
    {{- end }}
    {{- if .Values.api.config.metrics }}
    metrics:
      enabled: {{ .Values.api.config.metrics.enabled }}
    {{- end }}
    runner_artifacts:
      # int64 cast keeps Helm from emitting YAML scientific notation
      # for values above ~1M (Pydantic refuses to parse those as int).
      # Default 256 MiB (256 * 1024 * 1024 = 268435456).
      plan_artifacts_max_bytes: {{ .Values.runners.planArtifactsMaxBytes | default 268435456 | int64 }}
    {{- if .Values.api.config.artifact_retention }}
    artifact_retention:
      enabled: {{ .Values.api.config.artifact_retention.enabled }}
      poll_interval_seconds: {{ .Values.api.config.artifact_retention.poll_interval_seconds | default 86400 }}
      batch_size: {{ .Values.api.config.artifact_retention.batch_size | default 100 }}
      state_versions_keep: {{ .Values.api.config.artifact_retention.state_versions_keep | default 20 }}
      run_artifacts_retention_days: {{ .Values.api.config.artifact_retention.run_artifacts_retention_days | default 90 }}
      config_versions_retention_days: {{ .Values.api.config.artifact_retention.config_versions_retention_days | default 90 }}
      provider_cache_retention_days: {{ .Values.api.config.artifact_retention.provider_cache_retention_days | default 30 }}
      binary_cache_retention_days: {{ .Values.api.config.artifact_retention.binary_cache_retention_days | default 30 }}
      module_overrides_retention_days: {{ .Values.api.config.artifact_retention.module_overrides_retention_days | default 14 }}
    {{- end }}
    {{- if .Values.backup }}
    backup:
      prefix: {{ .Values.backup.prefix | default "backups/" | quote }}
      retention_keep: {{ (.Values.backup.retention).keep | default 0 }}
      retention_days: {{ (.Values.backup.retention).days | default 0 }}
    {{- end }}
    {{- if .Values.api.config.encryption }}
    # App-layer encryption at rest (#553) — non-secret config only; the static
    # master key + Vault token arrive via secretKeyRef env, never here.
    encryption:
      enabled: {{ .Values.api.config.encryption.enabled | default false }}
      provider: {{ .Values.api.config.encryption.provider | default "static" | quote }}
      vault_address: {{ .Values.api.config.encryption.vault_address | default "" | quote }}
      vault_mount: {{ .Values.api.config.encryption.vault_mount | default "transit" | quote }}
      vault_key_name: {{ .Values.api.config.encryption.vault_key_name | default "terrapod" | quote }}
      vault_namespace: {{ .Values.api.config.encryption.vault_namespace | default "" | quote }}
      aws_kms_key_id: {{ .Values.api.config.encryption.aws_kms_key_id | default "" | quote }}
      aws_kms_region: {{ .Values.api.config.encryption.aws_kms_region | default "" | quote }}
    {{- end }}
    {{- if .Values.api.config.ai_summary }}
    ai_summary:
      enabled: {{ .Values.api.config.ai_summary.enabled | default false }}
      {{- if .Values.api.config.ai_summary.model }}
      model: {{ .Values.api.config.ai_summary.model | quote }}
      {{- end }}
      {{- if .Values.api.config.ai_summary.api_base }}
      api_base: {{ .Values.api.config.ai_summary.api_base | quote }}
      {{- end }}
      max_output_tokens: {{ .Values.api.config.ai_summary.max_output_tokens | default 16384 | int64 }}
      request_timeout_seconds: {{ .Values.api.config.ai_summary.request_timeout_seconds | default 60 | int64 }}
      # int64 cast prevents Helm's default float formatter from emitting
      # YAML scientific notation (e.g. `5e+06`) for values above ~1M,
      # which Pydantic on the API side refuses to parse as an int.
      daily_token_budget: {{ .Values.api.config.ai_summary.daily_token_budget | default 0 | int64 }}
      plan_json_max_bytes: {{ .Values.api.config.ai_summary.plan_json_max_bytes | default 500000 | int64 }}
      code_context_max_bytes: {{ .Values.api.config.ai_summary.code_context_max_bytes | default 200000 | int64 }}
      code_diff_max_bytes: {{ .Values.api.config.ai_summary.code_diff_max_bytes | default 100000 | int64 }}
      followup_max_messages_per_run: {{ .Values.api.config.ai_summary.followup_max_messages_per_run | default 20 | int64 }}
      followup_max_output_tokens: {{ .Values.api.config.ai_summary.followup_max_output_tokens | default 2048 | int64 }}
      {{- with .Values.api.config.ai_summary.auth }}
      auth:
        # api_key is injected via env var (TERRAPOD_AI_SUMMARY__AUTH__API_KEY)
        # from a K8s Secret; never rendered into this ConfigMap.
        aws_region: {{ .aws_region | default "us-east-1" | quote }}
        {{- if .aws_role_arn }}
        aws_role_arn: {{ .aws_role_arn | quote }}
        {{- end }}
        aws_session_name: {{ .aws_session_name | default "terrapod-ai-summary" | quote }}
        {{- if .aws_external_id }}
        aws_external_id: {{ .aws_external_id | quote }}
        {{- end }}
      {{- end }}
      {{- with .Values.api.config.ai_summary.context }}
      context:
        prompt_prefix: {{ .prompt_prefix | default "" | quote }}
        prompt_suffix: {{ .prompt_suffix | default "" | quote }}
        fleet_context: {{ .fleet_context | default "" | quote }}
      {{- end }}
    {{- end }}
    default_execution_backend: {{ .Values.api.config.default_execution_backend | default "tofu" | quote }}
    default_terraform_version: {{ .Values.api.config.default_terraform_version | default "1.12" | quote }}
    {{- with .Values.api.config.cors }}
    {{- /* Only emit `cors:` when at least one child renders — a bare `cors:`
           serialises to null, which Settings (CORSConfig) rejects. The common
           `cors: { allow_origins: [] }` default therefore renders nothing and
           the API uses its CORSConfig default. */}}
    {{- if or .allow_origins (hasKey . "allow_credentials") .allow_methods .allow_headers }}
    cors:
      {{- with .allow_origins }}
      allow_origins:
        {{- range . }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- if hasKey . "allow_credentials" }}
      allow_credentials: {{ .allow_credentials }}
      {{- end }}
      {{- with .allow_methods }}
      allow_methods:
        {{- range . }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- with .allow_headers }}
      allow_headers:
        {{- range . }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
    {{- end }}
    {{- end }}
    {{- if .Values.api.config.rate_limit }}
    rate_limit:
      enabled: {{ .Values.api.config.rate_limit.enabled }}
      {{- /* Rendered directly (no `| default`): 0 means "unlimited" for these
             rates and Helm's `default` would silently rewrite a configured 0. */}}
      requests_per_minute: {{ .Values.api.config.rate_limit.requests_per_minute }}
      authenticated_requests_per_minute: {{ .Values.api.config.rate_limit.authenticated_requests_per_minute }}
      runner_requests_per_minute: {{ .Values.api.config.rate_limit.runner_requests_per_minute }}
      auth_requests_per_minute: {{ .Values.api.config.rate_limit.auth_requests_per_minute }}
    {{- end }}
{{- end }}
