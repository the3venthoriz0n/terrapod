{{- if and .Values.networkPolicies.enabled .Values.web.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "terrapod.fullname" . }}-web
  labels:
    {{- include "terrapod.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "terrapod.name" . }}
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress controller
    - ports:
        - protocol: TCP
          port: 3000
  egress:
    # API server
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "terrapod.name" . }}
              app.kubernetes.io/component: api
      ports:
        - protocol: TCP
          port: 8000
    # DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
