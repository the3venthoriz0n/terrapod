{{- include "terrapod.validateWebhookIngress" . -}}
{{- include "terrapod.validateInternalIngress" . -}}
{{- if .Values.ingress.enabled }}
{{- include "terrapod.validateIngressWeb" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "terrapod.fullname" . }}
  labels:
    {{- include "terrapod.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.hostname }}
      secretName: {{ .Values.tls.existingSecret | default (printf "%s-tls" (include "terrapod.fullname" .)) }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.hostname }}
      http:
        paths:
          {{- with .Values.ingress.extraPaths }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          # BFF: all traffic enters through the web frontend.
          # Next.js rewrites proxy /api/* and /.well-known/* to the API
          # service internally (via API_URL env var).
          - path: /
            pathType: {{ .Values.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "terrapod.fullname" . }}-web
                port:
                  name: http
{{- end }}
{{- if .Values.webhookIngress.enabled }}
---
# Public webhook Ingress — restricted to the inbound-from-public-internet
# allow-list (VCS webhooks, run-task callbacks). The management surface
# (UI, admin API, CLI, SSO callback, state uploads) stays on the primary
# `ingress` block above, which the operator can keep private/restricted.
#
# Routes to the same web Service (BFF rule still holds) — Next.js
# rewrites the matched paths to the API service internally. Auth on
# these routes is HMAC- or token-based per endpoint, not session-based,
# so they're safe to receive directly from off-tailnet callers.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "terrapod.fullname" . }}-webhooks
  labels:
    {{- include "terrapod.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhooks
  {{- with .Values.webhookIngress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.webhookIngress.className }}
  ingressClassName: {{ .Values.webhookIngress.className }}
  {{- end }}
  {{- if .Values.webhookIngress.tls }}
  tls:
    - hosts:
        - {{ .Values.webhookIngress.hostname }}
      secretName: {{ printf "%s-webhooks-tls" (include "terrapod.fullname" .) }}
  {{- end }}
  rules:
    - host: {{ .Values.webhookIngress.hostname }}
      http:
        paths:
          {{- range .Values.webhookIngress.paths }}
          - path: {{ . }}
            pathType: {{ $.Values.webhookIngress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "terrapod.fullname" $ }}-web
                port:
                  name: http
          {{- end }}
{{- end }}
{{- if .Values.internalIngress.enabled }}
---
# Internal Ingress — the network-isolated route used by listener pods +
# runner Jobs from other clusters. Routes to the same web Service (BFF
# rule still holds) so listener auth (bearer cert), runner-token auth,
# and TFE-V2 session auth all work uniformly regardless of which Ingress
# the request entered through.
#
# Default `paths: ["/"]` because this Ingress is internal-trusted —
# there's no security reason to allow-list paths. Operators can narrow
# if their controller requires explicit declarations.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "terrapod.fullname" . }}-internal
  labels:
    {{- include "terrapod.labels" . | nindent 4 }}
    app.kubernetes.io/component: internal
  {{- with .Values.internalIngress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.internalIngress.className }}
  ingressClassName: {{ .Values.internalIngress.className }}
  {{- end }}
  {{- if .Values.internalIngress.tls }}
  tls:
    - hosts:
        - {{ .Values.internalIngress.hostname }}
      secretName: {{ .Values.internalIngress.existingSecret | default (printf "%s-internal-tls" (include "terrapod.fullname" .)) }}
  {{- end }}
  rules:
    - host: {{ .Values.internalIngress.hostname }}
      http:
        paths:
          {{- with .Values.internalIngress.extraPaths }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          {{- range .Values.internalIngress.paths }}
          - path: {{ . }}
            pathType: {{ $.Values.internalIngress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "terrapod.fullname" $ }}-web
                port:
                  name: http
          {{- end }}
{{- end }}
