{{- if ne .Values.api.enabled false }}
{{- if and .Values.bootstrap (ne .Values.bootstrap.enabled false) }}
{{- if or (and .Values.bootstrap.adminEmail .Values.bootstrap.adminPassword) .Values.bootstrap.existingSecret }}
{{- $dbAuthMode := (.Values.api.config.database).auth_mode | default "password" }}
{{- $dbIam := or (eq $dbAuthMode "aws_iam") (eq $dbAuthMode "gcp_iam") (eq $dbAuthMode "azure_ad") }}
{{- $dbCa := or .Values.api.databaseCA.inline .Values.api.databaseCA.existingConfigMap }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "terrapod.fullname" . }}-bootstrap-{{ .Release.Revision }}
  labels:
    {{- include "terrapod.labels" . | nindent 4 }}
    app.kubernetes.io/component: bootstrap
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "terrapod.labels" . | nindent 8 }}
        app.kubernetes.io/component: bootstrap
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $dbIam }}
      # Cloud-IAM DB auth: run under the API's IRSA/workload-identity SA so the
      # Job can mint a DB token (the cloud identity webhook projects its own token).
      serviceAccountName: {{ include "terrapod.serviceAccountName" . }}
      {{- end }}
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      containers:
        - name: bootstrap
          image: {{ include "terrapod.api.image" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - python
            - -m
            - terrapod.cli.bootstrap
          env:
            {{- $pgSecret := include "terrapod.postgresql.secretName" . }}
            {{- if $pgSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $pgSecret }}
                  key: {{ include "terrapod.postgresql.secretKey" . }}
            {{- else if .Values.postgresql.url }}
            - name: DATABASE_URL
              value: {{ .Values.postgresql.url | quote }}
            {{- end }}
            {{- if .Values.bootstrap.existingSecret }}
            - name: TERRAPOD_BOOTSTRAP_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrap.existingSecret }}
                  key: {{ .Values.bootstrap.emailKey | default "email" }}
            - name: TERRAPOD_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrap.existingSecret }}
                  key: {{ .Values.bootstrap.passwordKey | default "password" }}
            {{- else }}
            - name: TERRAPOD_BOOTSTRAP_ADMIN_EMAIL
              value: {{ .Values.bootstrap.adminEmail | quote }}
            - name: TERRAPOD_BOOTSTRAP_ADMIN_PASSWORD
              value: {{ .Values.bootstrap.adminPassword | quote }}
            {{- end }}
            {{- if .Values.bootstrap.poolName }}
            - name: TERRAPOD_BOOTSTRAP_POOL_NAME
              value: {{ .Values.bootstrap.poolName | quote }}
            {{- end }}
            {{- if .Values.bootstrap.poolToken }}
            - name: TERRAPOD_BOOTSTRAP_POOL_TOKEN
              value: {{ .Values.bootstrap.poolToken | quote }}
            {{- end }}
            {{- if $dbIam }}
            - name: TP_DB_AUTH_MODE
              value: {{ $dbAuthMode | quote }}
            - name: TP_DB_AWS_IAM_REGION
              value: {{ (.Values.api.config.database).aws_iam_region | default "" | quote }}
            - name: TP_DB_SSL_MODE
              value: {{ (.Values.api.config.database).ssl_mode | default "" | quote }}
            - name: TP_DB_SSL_ROOT_CERT
              {{- if $dbCa }}
              value: {{ printf "/etc/terrapod/db-ca/%s" (.Values.api.databaseCA.key | default "ca.pem") | quote }}
              {{- else }}
              value: {{ (.Values.api.config.database).ssl_root_cert | default "" | quote }}
              {{- end }}
            {{- end }}
          {{- if and $dbIam $dbCa }}
          volumeMounts:
            - name: database-ca
              mountPath: /etc/terrapod/db-ca
              readOnly: true
          {{- end }}
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            {{- toYaml .Values.api.containerSecurityContext | nindent 12 }}
      {{- if and $dbIam $dbCa }}
      volumes:
        - name: database-ca
          configMap:
            name: {{ .Values.api.databaseCA.existingConfigMap | default (printf "%s-database-ca" (include "terrapod.fullname" .)) }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}
