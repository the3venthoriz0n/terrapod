{{- if and (ne .Values.api.enabled false) .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "terrapod.fullname" . }}-migrations-{{ .Release.Revision }}
  labels:
    {{- include "terrapod.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "terrapod.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      containers:
        - name: migrations
          image: {{ include "terrapod.api.image" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - alembic
            - upgrade
            - head
          env:
            {{- if .Values.postgresql.existingSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.existingSecretKey | default "url" }}
            {{- else if .Values.postgresql.url }}
            - name: DATABASE_URL
              value: {{ .Values.postgresql.url | quote }}
            {{- end }}
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            {{- toYaml .Values.api.containerSecurityContext | nindent 12 }}
{{- end }}
