{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "terrapod.fullname" . }}-runner
  namespace: {{ .Values.listener.runnerNamespace | default .Release.Namespace }}
  labels:
    {{- include "terrapod.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: terrapod-runner
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # API server (presigned URLs, status reporting)
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "terrapod.name" . }}
              app.kubernetes.io/component: api
      ports:
        - protocol: TCP
          port: 8000
    # HTTPS (cloud provider APIs, provider downloads)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Explicitly deny Postgres and Redis access from runners
    # (handled by the absence of those ports in the egress rules above)
{{- end }}
