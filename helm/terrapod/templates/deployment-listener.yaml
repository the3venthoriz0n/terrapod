{{- if .Values.listener.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "terrapod.fullname" . }}-listener
  labels:
    {{- include "terrapod.labels" . | nindent 4 }}
    app.kubernetes.io/component: listener
spec:
  {{- if not .Values.listener.autoscaling.enabled }}
  replicas: {{ .Values.listener.replicas }}
  {{- end }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.listener.strategy.maxSurge }}
      maxUnavailable: {{ .Values.listener.strategy.maxUnavailable }}
  minReadySeconds: {{ .Values.listener.minReadySeconds | default 30 }}
  selector:
    matchLabels:
      {{- include "terrapod.listener.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/runner-config: {{ include (print $.Template.BasePath "/configmap-runner.yaml") . | sha256sum }}
        {{- with .Values.listener.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "terrapod.listener.selectorLabels" . | nindent 8 }}
        {{- with .Values.listener.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "terrapod.listenerServiceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.listener.terminationGracePeriodSeconds }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.listener.extraInitContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: listener
          image: {{ include "terrapod.listener.image" . }}
          imagePullPolicy: {{ .Values.listener.image.pullPolicy }}
          command:
            - python
            - -m
            - terrapod.runner.listener
          ports:
            - name: health
              containerPort: {{ .Values.listener.healthPort | default 8081 }}
              protocol: TCP
          env:
            - name: TERRAPOD_RUNNER_NAMESPACE
              value: {{ include "terrapod.runnerNamespace" . | quote }}
            - name: TERRAPOD_LISTENER_NAME
              value: {{ .Values.listener.name | default "listener" | quote }}
            # Credentials-Secret name is tied to the listener Deployment, not
            # to listener.name, so renaming the listener (changing its
            # API-registered identity) doesn't orphan the Secret.
            - name: TERRAPOD_CREDENTIALS_SECRET_NAME
              value: {{ include "terrapod.listenerCredentialsSecretName" . | quote }}
            - name: TERRAPOD_HEALTH_PORT
              value: {{ .Values.listener.healthPort | default 8081 | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: TERRAPOD_API_URL
              value: {{ .Values.listener.apiUrl | default (printf "http://%s-api:8000" (include "terrapod.fullname" .)) | quote }}
            # Cert TTL drives the renewal threshold (renew at 50% + splay).
            # Must match `api.config.agent_pools.listener_cert_ttl_seconds` so
            # pods anticipate renewal correctly. Values-local.yaml lowers
            # this for fast iteration.
            - name: TERRAPOD_LISTENER_CERT_TTL_SECONDS
              value: {{ .Values.api.config.agent_pools.listener_cert_ttl_seconds | default 3600 | quote }}
            {{- if .Values.listener.existingSecret }}
            - name: TERRAPOD_JOIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.listener.existingSecret }}
                  key: {{ .Values.listener.joinTokenKey | default "join_token" }}
            {{- else if .Values.listener.joinToken }}
            - name: TERRAPOD_JOIN_TOKEN
              value: {{ .Values.listener.joinToken | quote }}
            {{- end }}
            {{- with .Values.listener.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.listener.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: runner-config
              mountPath: /etc/terrapod
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- with .Values.listener.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: health
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "{{ .Values.listener.preStopSleepSeconds | default 15 }}"]
          resources:
            {{- toYaml .Values.listener.resources | nindent 12 }}
          {{- with .Values.listener.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.listener.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: runner-config
          configMap:
            name: {{ include "terrapod.fullname" . }}-runner-config
        # Cert material lives in the K8s Secret named after the Deployment
        # (TERRAPOD_CREDENTIALS_SECRET_NAME above), accessed via the K8s API
        # by the listener — not via a volume mount.
        - name: tmp
          emptyDir: {}
        {{- with .Values.listener.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.listener.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.listener.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "terrapod.podAntiAffinity" (dict "enabled" .Values.listener.podAntiAffinity.enabled "affinity" .Values.listener.affinity "labels" (include "terrapod.listener.selectorLabels" .)) }}
      {{- if .Values.listener.priorityClassName }}
      priorityClassName: {{ .Values.listener.priorityClassName | quote }}
      {{- end }}
      {{- with .Values.listener.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.listener.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
