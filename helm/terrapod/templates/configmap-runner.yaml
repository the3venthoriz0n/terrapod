{{- if .Values.listener.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "terrapod.fullname" . }}-runner-config
  labels:
    {{- include "terrapod.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
data:
  runners.yaml: |
    image:
      repository: {{ include "terrapod.runner.imageRepo" . | quote }}
      tag: {{ .Values.runners.image.tag | default .Chart.AppVersion | quote }}
      pull_policy: {{ .Values.runners.image.pullPolicy | quote }}
    server_url: {{ .Values.runners.serverUrl | default .Values.listener.apiUrl | default (printf "http://%s-api:8000" (include "terrapod.fullname" .)) | quote }}
    service_account_name: {{ include "terrapod.runnerServiceAccountName" . | quote }}
    azure_workload_identity: {{ .Values.runners.azureWorkloadIdentity | default false }}
    ttl_seconds_after_finished: {{ .Values.runners.ttlSecondsAfterFinished }}
    termination_grace_period_seconds: {{ .Values.runners.terminationGracePeriodSeconds }}
    token_ttl_seconds: {{ .Values.runners.tokenTTLSeconds }}
    max_token_ttl_seconds: {{ .Values.runners.maxTokenTTLSeconds }}
    stale_timeout_seconds: {{ .Values.runners.staleTimeoutSeconds }}
    drift_max_duration_seconds: {{ .Values.runners.driftMaxDurationSeconds | default 1800 }}
    lifecycle_destroy_retries: {{ .Values.runners.lifecycleDestroyRetries | default 2 }}
    lifecycle_destroy_retry_backoff_seconds: {{ .Values.runners.lifecycleDestroyRetryBackoffSeconds | default 45 }}
    {{- with .Values.runners.imagePullSecrets }}
    image_pull_secrets:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.runners.nodeSelector }}
    node_selector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.runners.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.runners.affinity }}
    affinity:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.runners.podAnnotations }}
    pod_annotations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- if .Values.runners.priorityClassName }}
    priority_class_name: {{ .Values.runners.priorityClassName | quote }}
    {{- end }}
    {{- with .Values.runners.topologySpreadConstraints }}
    topology_spread_constraints:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.runners.podSecurityContext }}
    pod_security_context:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.runners.extraEnv }}
    extra_env:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.runners.extraEnvFrom }}
    extra_env_from:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- /*
    Forward proxy (#592): the runner Job fetches PUBLIC registry/git modules
    directly, which is the egress the proxy is for. When a proxy is configured
    the listener injects HTTP(S)_PROXY/NO_PROXY into the Job.

    no_proxy carries the cluster-local defaults (loopback, the *.svc /
    *.cluster.local domains, and the bare in-cluster Service names). We do NOT
    assume the runner→API hop is always proxy-exempt: in the ARC split-cluster
    topology the listener+runner live in a DIFFERENT cluster from the API and
    reach it over the PUBLIC URL — that hop SHOULD traverse the proxy, and it
    does because the public host isn't in this list. The bare Service name
    `<release>-api` only matches (and only needs to bypass) when the API really
    is in-cluster; in split-cluster it simply never matches. Operators who have
    a direct path to a remote API can add its host to proxy.noProxy.
    */}}
    {{- if .Values.proxy.enabled }}
    {{- $fn := include "terrapod.fullname" . }}
    {{- $defaults := list "localhost" "127.0.0.1" ".svc" ".svc.cluster.local" ".cluster.local" (printf "%s-api" $fn) (printf "%s-web" $fn) (printf "%s-postgresql" $fn) (printf "%s-redis" $fn) }}
    proxy:
      http_proxy: {{ .Values.proxy.httpProxy | quote }}
      https_proxy: {{ .Values.proxy.httpsProxy | quote }}
      no_proxy: {{ join "," (concat $defaults (.Values.proxy.noProxy | default (list))) | quote }}
    {{- end }}
    {{- /*
    Custom CA trust bundle (#592): the listener reads its OWN mounted raw CA
    source file (path below) and ships it into a per-run Secret in the runner
    namespace; the runner Job's init container merges it with the runner image's
    own system roots. We deliver the raw source (not the listener's merged
    bundle) so the runner trusts runner-system-roots + custom-CA, not the
    listener image's roots.
    */}}
    {{- if eq (include "terrapod.caBundle.enabled" .) "true" }}
    ca_bundle_enabled: true
    ca_bundle_source_path: {{ printf "/etc/terrapod-ca-src/%s" (include "terrapod.caBundle.key" .) | quote }}
    {{- end }}
{{- end }}
