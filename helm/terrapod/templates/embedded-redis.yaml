{{- /*
EMBEDDED REDIS — EVAL / DEV ONLY (gated on redis.deploy).

Single-replica, in-cluster Redis so the chart can run with zero external
dependencies for local evaluation (`make eval`) and the Tilt dev loop. NOT
production-grade: one replica, no auth, no persistence, no HA. For production,
leave redis.deploy=false and provide a managed Redis/Valkey via redis.url /
redis.existingSecret.
*/ -}}
{{- if .Values.redis.deploy }}
{{- $name := printf "%s-redis" (include "terrapod.fullname" .) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "terrapod.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  annotations:
    # Pre-install hook (weight -20, same as the embedded Postgres) so Redis is
    # up BEFORE the API rolls out — the API's lifespan pings Redis and EXITS if
    # it can't connect, so a main-resource Redis that starts concurrently makes
    # the API crash-loop on a slow node until Redis is ready. No hook-delete-
    # policy: the hook isn't re-run on upgrade and the original keeps serving.
    # Eval/dev only (gated on redis.deploy); production uses external Redis.
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-20"
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "terrapod.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "terrapod.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: {{ .Values.redis.embedded.image }}
          imagePullPolicy: IfNotPresent
          args: ["--save", "", "--appendonly", "no"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.redis.embedded.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "terrapod.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  annotations:
    # Same pre-install hook as the Deployment so the Service exists when the
    # API (and its pre-install hooks) resolve terrapod-redis. See above.
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-20"
spec:
  selector:
    {{- include "terrapod.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
{{- end }}
