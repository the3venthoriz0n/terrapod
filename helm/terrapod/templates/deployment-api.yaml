{{- if ne .Values.api.enabled false }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "terrapod.fullname" . }}-api
  labels:
    {{- include "terrapod.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicas }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.api.strategy.maxSurge }}
      maxUnavailable: {{ .Values.api.strategy.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "terrapod.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-api.yaml") . | sha256sum }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "terrapod.api.selectorLabels" . | nindent 8 }}
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "terrapod.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.api.terminationGracePeriodSeconds }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.extraInitContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "terrapod.api.image" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          {{- if .Values.api.command }}
          command:
            {{- toYaml .Values.api.command | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: TERRAPOD_STORAGE__FILESYSTEM__HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "terrapod.fullname" . }}-storage
                  key: hmac-secret
                  optional: true
            {{- if .Values.postgresql.existingSecret }}
            - name: TERRAPOD_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.existingSecretKey | default "url" }}
            {{- else if .Values.postgresql.url }}
            - name: TERRAPOD_DATABASE_URL
              value: {{ .Values.postgresql.url | quote }}
            {{- end }}
            {{- if .Values.redis.existingSecret }}
            - name: TERRAPOD_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: {{ .Values.redis.existingSecretKey | default "url" }}
            {{- else if .Values.redis.url }}
            - name: TERRAPOD_REDIS_URL
              value: {{ .Values.redis.url | quote }}
            {{- end }}
            {{- range .Values.api.config.auth.sso.oidc }}
            - name: TERRAPOD_{{ .name | upper }}_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecret | default (printf "%s-%s" (include "terrapod.fullname" $) .name) }}
                  key: {{ .existingSecretKey | default "client_secret" }}
            {{- end }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.api.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/terrapod
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if eq .Values.api.config.storage.backend "filesystem" }}
            - name: storage
              mountPath: {{ .Values.api.config.storage.filesystem.root_dir }}
            {{- end }}
            {{- with .Values.api.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          {{- with .Values.api.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.api.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "terrapod.fullname" . }}-api-config
        - name: tmp
          emptyDir: {}
        {{- if eq .Values.api.config.storage.backend "filesystem" }}
        - name: storage
          {{- if .Values.storage.filesystem.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "terrapod.fullname" . }}-storage
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- with .Values.api.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "terrapod.podAntiAffinity" (dict "enabled" .Values.api.podAntiAffinity.enabled "affinity" .Values.api.affinity "labels" (include "terrapod.api.selectorLabels" .)) }}
      {{- if .Values.api.priorityClassName }}
      priorityClassName: {{ .Values.api.priorityClassName | quote }}
      {{- end }}
      {{- with .Values.api.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
