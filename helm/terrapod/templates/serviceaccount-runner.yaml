{{- if and .Values.listener.enabled .Values.runners.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "terrapod.runnerServiceAccountName" . }}
  namespace: {{ include "terrapod.runnerNamespace" . }}
  labels:
    {{- include "terrapod.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
  {{- with .Values.runners.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
