# Local development overrides for Tilt
# This file is used by Tiltfile for local Kubernetes development

api:
  replicas: 1

  # Hot reload for local dev
  command: ["uvicorn", "terrapod.api.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--timeout-graceful-shutdown", "5"]

  # Local-only: inject AWS creds for the in-development AI plan-summary
  # feature (#401). The k8s Secret is created out-of-band via kubectl;
  # both the user and the inline policy auto-expire on 2026-06-08T23:59:59Z
  # so this is safe to leave wired even if the Secret is forgotten.
  extraEnvFrom:
    - secretRef:
        name: terrapod-ai-summary-aws-creds
        optional: true

  autoscaling:
    enabled: false

  pdb:
    enabled: false
  podAntiAffinity:
    enabled: false

  # Tilt + Rancher Desktop don't always have a CSI provisioner that satisfies
  # generic ephemeral volumes; the system tempdir is fine for local dev where
  # we don't poll giant monorepos.
  ephemeralStorage:
    enabled: false

  # Dev overrides — relax security for hot reload (writable filesystem for __pycache__, .pyc)
  # Dev images use string usernames (terrapod/nextjs) which k8s can't verify as non-root
  podSecurityContext:
    runAsNonRoot: false
  containerSecurityContext:
    runAsNonRoot: false
    readOnlyRootFilesystem: false

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  config:
    log_level: debug
    external_url: "https://terrapod.local"
    storage:
      backend: filesystem
      filesystem:
        root_dir: /var/lib/terrapod/storage
        base_url: "https://terrapod.local"
    audit:
      retention_days: 90
    registry:
      provider_cache:
        platforms:
          - os: darwin
            arch: arm64
      # Allow RC-tier pre-release terraform/tofu binaries in local dev so we
      # can try upcoming releases (e.g. terraform 1.15-rc, tofu 1.12-beta)
      # before they GA. Production defaults to "none" (GA only).
      binary_cache:
        allow_prerelease: rc
    # Fast cert renewal cycle for Tilt — listener cert valid for 5min so the
    # full bootstrap → renew → rotate loop is observable in a few minutes
    # instead of an hour. Production stays at the 1h default.
    agent_pools:
      listener_cert_ttl_seconds: 300
    auth:
      local_enabled: true
      callback_base_url: "https://terrapod.local"
      session_ttl_hours: 12
      # Disable bound-token idle-login rejection in local dev (#495): otherwise
      # a curl/CLI token stops working 7 days after the last interactive login,
      # which is noise for local testing. Production keeps the default (7).
      bound_token_idle_days: 0

    # AI plan-summary (#401) — Bedrock Converse via LiteLLM. The
    # terrapod-testing IAM user's static keys (delivered via the
    # terrapod-ai-summary-aws-creds K8s Secret + extraEnvFrom above)
    # are picked up by boto3's default credential chain. No AssumeRole
    # hop in local dev — the user's inline policy grants Bedrock
    # actions directly and auto-expires on 2026-06-08. Production
    # deployments set aws_role_arn to chain into the central role.
    ai_summary:
      enabled: true
      # Model is intentionally NOT overridden here — falls through to
      # the chart default in values.yaml
      # (bedrock/us.anthropic.claude-sonnet-4-6 as of #463), which is
      # in the recommended-for-chat tier (Bedrock prompt caching,
      # ~5× cheaper than Opus, better at structured tool calls).
      # Use the upstream default (16384); 1024 caused real-plan truncation.
      # Override here only if you have a reason.
      request_timeout_seconds: 90
      daily_token_budget: 0  # no cap in local dev
      plan_json_max_bytes: 500000
      code_context_max_bytes: 200000
      code_diff_max_bytes: 100000
      auth:
        aws_region: us-east-1
        # aws_role_arn intentionally unset — use the pod's env-var
        # creds (terrapod-testing user) directly. Set to
        # "arn:aws:iam::703581221739:role/terrapod" in production.
      context:
        fleet_context: |
          This is a local Tilt development stack for Terrapod itself.
          Workspaces here are throw-away test fixtures, not real
          infrastructure. Bias toward low/medium risk ratings unless
          the plan actually destroys data stores or IAM trust roots.

  serviceAccount:
    create: true

# Web UI (Next.js dev server in K8s)
web:
  enabled: true
  replicas: 1
  pdb:
    enabled: false
  podAntiAffinity:
    enabled: false

  # Dev overrides — relax security for hot reload (writable filesystem for Next.js cache)
  podSecurityContext:
    runAsNonRoot: false
  containerSecurityContext:
    runAsNonRoot: false
    readOnlyRootFilesystem: false

  # next dev compiles on first request — startup probe gives it time
  startupProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 30
    failureThreshold: 12
  livenessProbe:
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 10
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 10

  # Dedicated emptyDir for Next.js build cache. Keeps hot-reload churn off
  # the container overlay fs so dev rebuilds don't thrash the layer cache.
  extraVolumeMounts:
    - name: next-cache
      mountPath: /app/.next

  extraVolumes:
    - name: next-cache
      emptyDir: {}

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      # Next.js dev server routinely spikes over 1Gi on cold starts; bump
      # to avoid OOMKills during the first few builds under Tilt.
      memory: 2Gi

# Ingress — BFF through web frontend, mkcert TLS
ingress:
  enabled: true
  hostname: terrapod.local
  tls: true

tls:
  existingSecret: terrapod-tls-local

# Listener config for local dev
listener:
  replicas: 1
  name: "dev-listener"
  podAntiAffinity:
    enabled: false
  podSecurityContext:
    runAsNonRoot: false
  containerSecurityContext:
    runAsNonRoot: false
    readOnlyRootFilesystem: false
  joinToken: "dev-join-token-do-not-use-in-prod"
  pdb:
    enabled: false

# Bootstrap admin user + agent pool for local dev
bootstrap:
  adminEmail: admin
  adminPassword: admin
  poolName: dev-pool
  poolToken: "dev-join-token-do-not-use-in-prod"

# Local PostgreSQL (bundled via Tiltfile)
postgresql:
  url: "postgresql+asyncpg://terrapod:terrapod@terrapod-postgresql:5432/terrapod"

# Local Redis (bundled via Tiltfile)
redis:
  url: "redis://terrapod-redis:6379"

storage:
  filesystem:
    persistence:
      enabled: true
      size: 1Gi

# Runner image for local dev (built locally)
runners:
  image:
    repository: terrapod-runner
    tag: local
    pullPolicy: Never
