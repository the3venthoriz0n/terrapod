# Terrapod Helm Chart Values
# Default configuration for production deployment
#
# SCHEMA CONTRACT: This file is validated against values.schema.json.
# When adding or renaming a key here, update values.schema.json to match.
# CI enforces this via `helm lint` (which validates against the schema).

nameOverride: ""
fullnameOverride: ""

# Global settings
global:
  # imageRegistry overrides the registry portion (ghcr.io) of all Terrapod image
  # references. Useful for ECR pull-through cache or private mirrors.
  # Example for ECR pull-through:
  #   imageRegistry: "123456789012.dkr.ecr.eu-west-1.amazonaws.com/ghcr"
  # This rewrites ghcr.io/mattrobinsonsre/terrapod-api to:
  #   123456789012.dkr.ecr.eu-west-1.amazonaws.com/ghcr/mattrobinsonsre/terrapod-api
  imageRegistry: ""
  # imagePullSecrets:
  #   - name: myregistrykey
  imagePullSecrets: []
  # Extra labels applied to all resources (Deployments, Services, Ingress, etc.)
  commonLabels: {}

# ── API Server (Python/FastAPI) ───────────────────────────────────────────────
api:
  # Set to false for agent-only deployments (listener + runners in a remote
  # cluster, API running elsewhere). When false, the API Deployment, Service,
  # ConfigMap, ServiceAccount, and storage PVC are not rendered.
  enabled: true

  # Filesystem storage (default) only supports a single replica.
  # For multi-replica HA, configure a cloud storage backend (s3, azure, gcs).
  replicas: 1

  image:
    repository: ghcr.io/mattrobinsonsre/terrapod-api
    tag: ""  # Defaults to appVersion
    pullPolicy: IfNotPresent

  # Override the container command (e.g., for hot reload in dev):
  # command: ["uvicorn", "terrapod.api.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
  command: []

  # Dedicated HMAC secret for stateless tokens (runner tokens + run-task
  # callback tokens). When unset, the signing key falls back to
  # sha256(database_url) — functionally fine, but it couples token-forgery
  # resistance to the database credentials. Point this at a K8s Secret to
  # decouple them. Leaving it unset does NOT invalidate in-flight tokens on
  # upgrade. Inject via secretKeyRef (the key is a secret, never a ConfigMap).
  tokenSigningKey:
    existingSecret: ""               # name of a K8s Secret holding the key
    existingSecretKey: "token_signing_key"  # key within that Secret

  # CA bundle for database TLS server-cert verification, used when
  # config.database.ssl_mode is "verify-ca"/"verify-full" (cloud-IAM DB auth).
  # A CA bundle is public, non-secret material, so provide it as a ConfigMap —
  # either inline (the chart creates the ConfigMap for you) or by referencing an
  # existing one. The chart mounts it read-only and wires
  # config.database.ssl_root_cert to the mounted path automatically. Leave unset
  # for ssl_mode require / a system-trusted CA.
  databaseCA:
    inline: ""                       # paste the CA bundle PEM here; the chart creates a ConfigMap for it
    existingConfigMap: ""            # OR reference an existing ConfigMap holding the CA bundle
    key: ca.pem                      # key within the ConfigMap (also the mounted filename)

  # Service configuration
  service:
    type: ClusterIP
    annotations: {}

  resources:
    # Request/limit ratios deliberately tight: CPU ≤ 2× request,
    # memory = request (Guaranteed QoS). Wide bands cause noisy-neighbour
    # evictions on memory and unpredictable throttling on CPU.
    #
    # Memory raised from 1Gi after the parallel VCS poller (v0.17.2,
    # PR #233) started holding up to 10 concurrent per-workspace archive
    # buffers + AsyncSession + httpx clients per cycle. Steady-state RSS
    # sits around 700-800Mi on moderate deployments and Python doesn't
    # return heap to the OS, so 1Gi was prone to OOMKill under load.
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "1"
      memory: 2Gi

  autoscaling:
    # Disabled by default — filesystem storage does not support multi-replica.
    # Enable after configuring a cloud storage backend (s3, azure, gcs).
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  pdb:
    enabled: true
    maxUnavailable: 1

  # Configuration mounted as /etc/terrapod/config.yaml
  config:
    log_level: info

    # Public-facing Terrapod URL (the Next.js frontend ingress).
    # Used for VCS commit status links, notification URLs, and any
    # outbound references back to the UI. Example: https://terrapod.example.com
    external_url: ""

    # Public webhook URL — the base URL Terrapod hands to EXTERNAL
    # services that call back into us from the public internet (VCS
    # webhook URL displayed in the connection edit screen; run-task
    # callback URL in the dispatched webhook payload). Independent
    # of `external_url` so deployments can put the management plane
    # on a private/restricted ingress while exposing only the webhook
    # surface publicly. When left empty, falls back to `external_url`
    # (acceptable when the management plane is itself public).
    #
    # Auto-derived by the chart when `webhookIngress.enabled` is true
    # (uses `webhookIngress.hostname`); operators can override
    # explicitly here.
    public_webhook_url: ""

    # SQLAlchemy connection pool settings for RDS Proxy / pgBouncer compatibility.
    # Tune these if using a connection pooler or high-availability PostgreSQL.
    database:
      pool_size: 10            # Persistent connections in pool
      max_overflow: 20         # Extra connections beyond pool_size
      pool_pre_ping: true      # SELECT 1 before checkout (handles stale connections)
      pool_recycle: 1800       # Recycle connections after N seconds (below proxy max lifetime)
      pool_timeout: 30         # Seconds to wait for a pool connection
      connect_timeout: 10      # TCP connect timeout in seconds
      command_timeout: 30      # Query timeout in seconds
      # DB auth (#573): "password" (default — static creds in the DB URL) or a
      # cloud-IAM mode that mints a short-lived token per connection under the
      # API's workload identity (no static DB password, TLS required):
      #   aws_iam   — AWS RDS IAM (IRSA)
      #   gcp_iam   — GCP Cloud SQL IAM (Workload Identity Federation)
      #   azure_ad  — Azure Database for PostgreSQL Entra auth (Azure Workload Identity)
      auth_mode: password
      aws_iam_region: ""       # AWS region for RDS IAM signing ("" = AWS_REGION env); aws_iam only
      ssl_mode: ""             # IAM-auth TLS: "" / require (encrypt) | verify-ca | verify-full
      ssl_root_cert: ""        # CA bundle path for verify-ca/verify-full (mount via api.extraVolumes); "" = system CAs

    # Redis/Valkey auth (#579). "password" (default — static auth string in the
    # Redis URL) or a cloud-IAM mode that mints a short-lived token per
    # connection under the API's workload identity (no static Redis secret, TLS
    # rediss:// required):
    #   aws_iam   — AWS ElastiCache IAM (IRSA; needs elasticache:Connect + aws_cache_name)
    #   gcp_iam   — GCP Memorystore IAM (Workload Identity Federation)
    #   azure_ad  — Azure Cache for Redis Entra auth (Azure Workload Identity)
    redis:
      auth_mode: password
      username: ""             # Redis ACL user for IAM (ElastiCache User / IAM user / Entra object id)
      aws_iam_region: ""       # AWS region for ElastiCache IAM signing; aws_iam only
      aws_cache_name: ""       # ElastiCache replication-group / serverless cache id (NOT the endpoint host); aws_iam only

    # Default execution backend and version for new workspaces
    default_execution_backend: tofu  # tofu | terraform
    default_terraform_version: "1.12"

    # Storage configuration — exactly one backend must be configured.
    # IMPORTANT: Filesystem storage is for dev/single-instance only.
    # For multi-replica HA, use a cloud backend (s3, azure, gcs).
    storage:
      # Backend: s3 | azure | gcs | filesystem
      backend: filesystem

      # AWS S3
      s3:
        bucket: ""
        region: us-east-1
        prefix: ""
        endpoint_url: ""
        presigned_url_expiry_seconds: 3600

      # Azure Blob Storage
      azure:
        account_name: ""
        container_name: ""
        prefix: ""
        presigned_url_expiry_seconds: 3600

      # Google Cloud Storage
      gcs:
        bucket: ""
        prefix: ""
        project_id: ""
        service_account_email: ""
        presigned_url_expiry_seconds: 3600

      # Local filesystem (default — for dev/CI)
      filesystem:
        root_dir: /var/lib/terrapod/storage
        presigned_url_expiry_seconds: 3600
        base_url: ""  # Auto-detected from ingress hostname if empty

    # Authentication
    auth:
      local_enabled: true

      # Public callback URL for SSO redirects. Required when SSO is enabled.
      # Must be the externally-reachable URL of your Terrapod instance.
      # The IDP callback lands at {callback_base_url}/api/terrapod/v1/auth/callback.
      callback_base_url: ""

      session_ttl_hours: 12
      api_token_max_ttl_hours: 8760  # 1 year; upper bound on any token. 0 = no limit
      # Lifespan of the token minted by `terraform login` — short-lived per-session
      # CLI credentials, distinct from the max cap above. 0 falls back to the cap.
      login_token_ttl_hours: 12
      # Service tokens (#495): separate (always-expiring) cap; warning lead time;
      # and the bound-token idle-login window (ON by default; 0 disables).
      service_token_max_ttl_hours: 8760
      token_expiry_warning_days: 14
      bound_token_idle_days: 7
      require_external_sso_for_roles: []

      # ── SSO / Identity Providers ──────────────────────────────────────
      # Client secrets are NEVER stored in this config or the ConfigMap.
      # For each OIDC provider, the deployment template injects an env var
      # TERRAPOD_{NAME}_CLIENT_SECRET from a K8s Secret via secretKeyRef.
      # Create the secret before deploying:
      #   kubectl create secret generic <existingSecret> \
      #     --from-literal=client_secret=<your-client-secret>
      sso:
        # Name of the default SSO provider (used when no provider is specified).
        # Must match the "name" of one of the providers below.
        default_provider: ""

        # ── OIDC Providers ────────────────────────────────────────────
        oidc: []
        # Example (Auth0):
        # - name: auth0
        #   display_name: "Auth0"           # Label shown on login button
        #   issuer_url: https://myorg.auth0.com/
        #   client_id: "your-client-id"
        #   scopes: ["openid", "profile", "email"]
        #   audience: ""                     # API audience (Auth0/Okta); omit if unused
        #   groups_claim: groups             # Claim name containing user groups
        #   role_prefixes: ["terrapod:", "terrapod-"]  # Stripped from group names
        #   # K8s Secret containing the client_secret:
        #   existingSecret: "terrapod-auth0"
        #   existingSecretKey: "client_secret"   # Key within the Secret

        # ── SAML Providers ────────────────────────────────────────────
        saml: []
        # Note: SAML providers authenticate via metadata URL exchange — no client
        # secret is needed. Unlike OIDC, there is no secretKeyRef injection for SAML.
        # Example (Azure AD SAML):
        # - name: azure-ad
        #   display_name: "Azure AD"
        #   metadata_url: https://login.microsoftonline.com/<tenant>/federationmetadata/2007-06/federationmetadata.xml
        #   entity_id: "https://terrapod.example.com"
        #   role_prefixes: ["terrapod:", "terrapod-"]

    # Private Registry & Caching
    registry:
      enabled: true
      # Sealed (cache-only) mode for air-gapped deployments. When true, NO
      # upstream fetch ever happens across the binary cache, provider network
      # mirror, terragrunt binary, and version resolution: a cache miss returns
      # an actionable 404 instead of attempting upstream, partial-version
      # resolution (e.g. "1.12") resolves ONLY against cached entries, and the
      # artifact-retention sweeper skips the binary/provider caches. Pre-populate
      # the cache first (bulk-warm admin endpoint/UI, typically with cache_only
      # off pointing at an internal mirror), then seal. See docs/registry.md.
      cache_only: false
      provider_cache:
        enabled: true
        upstream_registries:
          - registry.terraform.io
          - registry.opentofu.org
        warm_on_first_request: true
        platforms:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
        # Integrity verification for provider archives fetched from upstream.
        # One of: off, checksum, signature. 'signature' (default, fail-closed)
        # checks the archive SHA-256 against the registry-advertised shasum AND
        # verifies the registry's SHA256SUMS GPG signature against the
        # registry-advertised signing key (mirrors `terraform init`).
        # 'checksum' = shasum-only. 'off' = no verification (NOT recommended).
        verify: signature
        # In 'signature' mode, when an upstream advertises NO signature material
        # (private registries / non-signing mirrors / some community providers),
        # default false = fail closed. Set true to degrade to a shasum-only check
        # (with a warning) for those providers instead of rejecting them.
        allow_unsigned: false
      binary_cache:
        enabled: true
        terraform_mirror_url: "https://releases.hashicorp.com/terraform"
        tofu_mirror_url: "https://github.com/opentofu/opentofu/releases/download"
        # Upstream download base for terragrunt binaries (bare per-platform
        # binary, not a zip). Only used by workspaces with terragrunt enabled.
        terragrunt_mirror_url: "https://github.com/gruntwork-io/terragrunt/releases/download"
        # Version-index sources — separate from the *_mirror_url download bases
        # above. These are the endpoints the cache reads to LIST versions and to
        # resolve a partial version (e.g. "1.12" -> "1.12.3"). Upstream they live
        # on different hosts from the download base, so an internal-mirror /
        # air-gapped deployment must override BOTH the download base AND the
        # version index for each tool. A mirror MUST serve the same response
        # shape as the upstream it replaces:
        #   - terraform: HashiCorp index JSON  {"versions": {"1.12.3": {...}}}
        #   - tofu:      OpenTofu index JSON    {"versions": [{"id": "1.12.3"}]}
        #   - terragrunt: GitHub releases array [{"tag_name": "v0.58.0", ...}]
        terraform_version_index_url: "https://releases.hashicorp.com/terraform/index.json"
        tofu_version_index_url: "https://get.opentofu.org/tofu/api.json"
        terragrunt_version_index_url: "https://api.github.com/repos/gruntwork-io/terragrunt/releases"
        # Lowest pre-release tier to accept for terraform/tofu CLI version
        # resolution + caching. One of: none, rc, beta, alpha, dev.
        # 'none' (default) permits only GA releases. 'rc' allows release
        # candidates and GA. 'dev' allows everything. Set to 'rc' or 'beta'
        # in dev/staging to try upcoming releases like terraform 1.15-rc or
        # tofu 1.12-beta before they GA.
        allow_prerelease: none
        # Integrity verification for terraform/tofu/terragrunt binaries fetched
        # from upstream. One of: off, checksum, signature. 'signature' (default,
        # fail-closed) verifies the upstream SHA256SUMS GPG signature against the
        # pinned publisher key (HashiCorp / OpenTofu / Gruntwork) AND checks the
        # binary's SHA-256 against that signed manifest. The binary is executed
        # on every run, so verification is on by default. 'checksum' = manifest
        # compare only. 'off' = no verification (NOT recommended).
        verify: signature
        # Operator override for the pinned publisher keys, keyed by tool →
        # ASCII-armored public key. Empty (default) uses the keys bundled in the
        # image (HashiCorp / OpenTofu / Gruntwork). Supply a key to bridge an
        # upstream key rotation without a Terrapod release, or to trust an
        # internal re-signing mirror. Propagated to runner Jobs. Example:
        #   signing_keys:
        #     terraform: |
        #       -----BEGIN PGP PUBLIC KEY BLOCK-----
        #       ...
        signing_keys: {}
      module_interface:
        enabled: true

    # GPG signing key for provider registry
    # ASCII-armored GPG private key. If set, used to sign all provider SHA256SUMS.
    # If empty, a key is auto-generated on first provider upload.
    # In production, inject from K8s Secret via TERRAPOD_REGISTRY__SIGNING_KEY env var
    # registry:
    #   signing_key: ""

    # Service Catalog — no-code self-service provisioning over the module
    # registry. On by default; the catalog RBAC axis is opt-in (default
    # `none`), so no user can browse or provision until granted catalog
    # permission. Set to false to hide the surface entirely (endpoints 404).
    # See docs/service-catalog.md.
    catalog:
      enabled: true

    # VCS Integration
    # VCS connections (GitHub App installations, GitLab tokens) are created
    # dynamically via the API. All credentials are stored on the connection
    # itself — no secrets in Helm values.
    vcs:
      enabled: true
      poll_interval_seconds: 60
      github:
        # Optional: K8s Secret containing the webhook HMAC secret.
        # Only needed if GitHub webhooks are enabled for faster feedback.
        existingSecret: ""
        existingSecretKey: "webhook_secret"
      gitlab:
        # Optional: K8s Secret containing the global GitLab webhook secret
        # (matched against the X-Gitlab-Token header). Only needed if GitLab
        # webhooks are enabled for faster feedback and you aren't setting a
        # per-connection webhook secret on the VCS connection.
        existingSecret: ""
        existingSecretKey: "webhook_secret"

    # Audit logging
    audit:
      retention_days: 90

    # Agent pools — listener X.509 cert TTL + join-token defaults.
    agent_pools:
      # Listener cert lifetime in seconds. Listeners renew at 50% of this
      # plus a per-pod splay (0..30s). 1h is a good production default;
      # values-local.yaml overrides to 300s so renewal cycles are
      # observable in a few minutes.
      listener_cert_ttl_seconds: 3600
      # New join tokens default to 2 uses + 1h expiry — tolerates a single
      # bootstrap-race retry across multi-replica listener Deployments
      # without leaving the token reusable. Set per-token via the API to
      # override (max-uses=null means unlimited; expires-at=null means
      # no expiry).
      default_join_token_max_uses: 2
      default_join_token_ttl_seconds: 3600

    # AI plan-summary (#401). Off by default. When enabled, every
    # plan-phase terminal transition triggers an asynchronous LLM call
    # via the LiteLLM library — successful plans get a change-summary +
    # risk assessment; plan-phase failures get a failure analysis +
    # suggested fixes. Results are stored in the plan_summaries table,
    # surfaced in the run UI, and (for VCS-driven runs) edited into the
    # PR/MR comment.
    #
    # The `model` string's prefix selects the provider AND its auth path:
    #   bedrock/<id>     — AWS Bedrock via boto3 + IAM (IRSA / optional
    #                      sts:AssumeRole via aws_role_arn below)
    #   openai/<id>      — OpenAI direct, with auth.api_key
    #   anthropic/<id>   — Anthropic direct, with auth.api_key
    #   gemini/<id>      — Google AI Studio, with auth.api_key
    #   azure/<deployment> — Azure OpenAI, with auth.api_key + api_base
    #
    # For self-hosted OpenAI-compat endpoints (vLLM, a deployed
    # LiteLLM proxy, etc.), use `openai/<model>` with `api_base` set.
    #
    # Context layering (top → bottom of model prompt):
    #   1. In-code skill prompt (owns the JSON output contract)
    #   2. context.prompt_prefix (operator tone tweak)
    #   3. context.fleet_context (deployment-wide facts)
    #   4. context.prompt_suffix (operator tone tweak)
    #   5. Per-workspace ai_summary_context (additive workspace facts)
    ai_summary:
      enabled: false
      # LiteLLM model string. Examples:
      #   bedrock/us.anthropic.claude-sonnet-4-6  (default — recommended for chat)
      #   bedrock/anthropic.claude-opus-4-8
      #   openai/gpt-5
      #   anthropic/claude-opus-4-8
      #   gemini/gemini-2.5-pro
      #
      # The default targets Anthropic Sonnet 4.6 on Bedrock — chosen
      # because it supports Bedrock prompt caching (chat follow-ups
      # are ~10% the input-token cost of fresh requests), is in the
      # recommended-for-chat tier (multi-turn coherence proven), and
      # is ~5× cheaper than Opus while better at JSON-schema
      # compliance for the structured tool calls. `enabled: false`
      # remains the chart default so the feature is still
      # double-opt-in; setting a sensible model just means operators
      # don't ALSO have to look one up.
      #
      # See `docs/ai-plan-summary.md#choosing-a-model-for-chat` for
      # the full recommended tier when picking a different provider.
      model: "bedrock/us.anthropic.claude-sonnet-4-6"
      # Optional base URL override (vLLM, LiteLLM proxy, custom Azure).
      # Leave empty for vendor providers — LiteLLM knows the defaults.
      api_base: ""
      # Upper bound on model response tokens. Cap, not a target: the
      # model emits what it needs and stops on a natural stop token.
      # 16384 leaves comfortable headroom for very large plans (100+
      # resource changes with detailed risk listings) while staying
      # under Opus's 32K output ceiling.
      max_output_tokens: 16384
      request_timeout_seconds: 60
      # Output-token cap per UTC day across all summaries. 0 = unlimited.
      daily_token_budget: 0
      # Follow-up chat (#463). Per-run cap on USER turns — once an
      # operator has posted this many follow-ups on a single run,
      # the UI disables the chat input. Set to 0 to disable the
      # chat feature entirely (initial summary still fires).
      followup_max_messages_per_run: 20
      # Output-token cap per follow-up reply. Smaller than
      # max_output_tokens because follow-ups are conversational,
      # not full re-summaries. Bump only if operators routinely
      # hit `finish_reason=length` on detailed answers.
      followup_max_output_tokens: 2048
      # Size caps on the inputs attached to the model request.
      plan_json_max_bytes: 500000
      code_context_max_bytes: 200000
      # Size cap on the CODE_DIFF input (unified diff of *.tf / *.tfvars
      # between this run's config version and the previously-applied
      # config version). 0 disables CODE_DIFF entirely. Diffs are
      # usually tiny; this cap is a safety net for monorepo-scale
      # refactors.
      code_diff_max_bytes: 100000
      auth:
        # Bearer key for non-AWS providers (OpenAI, Anthropic, Gemini,
        # Azure, vLLM). Inject via TERRAPOD_AI_SUMMARY__AUTH__API_KEY
        # from a K8s Secret. Ignored when model="bedrock/..." (AWS
        # credential chain takes over).
        # api_key: ""
        # AWS / Bedrock fields. Only used when model="bedrock/...".
        # aws_role_arn empty → use pod's ambient IAM creds directly
        # (IRSA via the service account annotation). Set to chain
        # into a cross-account role via sts:AssumeRole.
        aws_region: us-east-1
        aws_role_arn: ""
        aws_session_name: terrapod-ai-summary
        aws_external_id: ""
      context:
        # Tone/emphasis tweaks around the in-code skill prompt. Do NOT
        # use these to change the output schema — that breaks the UI.
        prompt_prefix: ""
        prompt_suffix: ""
        # Deployment-wide facts about your infrastructure. Plain text
        # or markdown. Multiline strings are supported via `|`.
        fleet_context: ""

    # Drift Detection — scheduled plan-only runs to detect infrastructure drift
    drift_detection:
      enabled: true
      poll_interval_seconds: 300
      min_workspace_interval_seconds: 3600

    # Notifications
    notifications:
      enabled: true
      delivery_timeout_seconds: 30
      max_delivery_responses: 10
      smtp:
        host: ""
        port: 587
        username: ""
        # password: inject via TERRAPOD_NOTIFICATIONS__SMTP__PASSWORD env var
        from_address: "notifications@terrapod.local"
        use_tls: true

    # Rate limiting. Per client IP per 60-second sliding window. Set any
    # limit to 0 to disable that tier entirely (unlimited).
    rate_limit:
      enabled: true
      # Unauthenticated requests.
      requests_per_minute: 100
      # Requests carrying an Authorization header or session cookie (but
      # not a runner token). Higher default so one noisy interactive
      # client can't starve the rest of the pool.
      authenticated_requests_per_minute: 1000
      # Verified runner-token requests (HMAC-checked inline). Default is
      # unlimited because runners routinely burst on tofu init / apply
      # artifact uploads — throttling them causes plan failures. Raise if
      # you need a hard cap on a specific cluster.
      runner_requests_per_minute: 0
      # Auth endpoints (/api/terrapod/v1/auth/*, /oauth/*) — brute-force defence,
      # applies to all callers regardless of credentials.
      auth_requests_per_minute: 10

    # Prometheus metrics
    metrics:
      enabled: true
      serviceMonitor:
        enabled: false
        interval: 30s
        labels: {}
      podMonitor:
        enabled: false
        interval: 30s
        labels: {}
      # Shipped PrometheusRule (alert rules) — off by default; enable when you
      # run the Prometheus Operator. The bundled rules cover API availability /
      # error-rate / latency, stuck runs, listener launch failures, reconciler
      # stalls, DB/Redis/storage errors, cache miss rate, and retention errors.
      # Each alert carries a runbook_url annotation pointing at docs/runbooks.md.
      prometheusRule:
        enabled: false
        # Extra labels so your Prometheus's ruleSelector picks the rule up
        # (e.g. {release: kube-prometheus-stack}).
        labels: {}
        # Base URL the runbook_url annotations point at. Override to pin a tag
        # or mirror the runbooks internally.
        runbookBaseUrl: "https://github.com/mattrobinsonsre/terrapod/blob/main/docs/runbooks.md"
        # Append your own rule groups (raw PrometheusRule spec.groups entries).
        extraGroups: []
      # Bundled Grafana dashboard(s), shipped as a ConfigMap labeled for the
      # Grafana sidecar (kiwigrid/k8s-sidecar — used by kube-prometheus-stack
      # and the bitnami Grafana chart) so they auto-import. Off by default.
      # Operators without the sidecar can import helm/terrapod/dashboards/*.json
      # by hand.
      grafanaDashboards:
        enabled: false
        # Label the sidecar watches for. Match your Grafana sidecar config.
        labels:
          grafana_dashboard: "1"
        annotations: {}

    # Optional application-layer encryption at rest (#553). OFF by default.
    #
    # WHEN TO USE: for deployments WITHOUT a usable CSP at-rest encryption switch
    # — bare-metal, on-prem, niche cloud, or air-gapped — where this is your path
    # to encryption at rest. If your CSP already encrypts at rest (RDS/S3/Azure/
    # GCS), prefer that; this is then belt-and-braces, not a requirement.
    #
    # Phase 1 encrypts DB-stored secrets (starting with the CA private key).
    # KEK durability is the backend's job — and for `static` it is YOURS: losing
    # the master key makes encrypted data unrecoverable. See
    # docs/encryption-at-rest.md before enabling.
    encryption:
      enabled: false
      # static (operator-held key, works anywhere) | vault_transit (CSP-agnostic,
      # on-prem/air-gapped) | awskms (cloud belt-and-braces)
      provider: static
      # Vault Transit (provider: vault_transit)
      vault_address: ""
      vault_mount: transit
      vault_key_name: terrapod
      vault_namespace: ""
      # AWS KMS (provider: awskms)
      aws_kms_key_id: ""
      aws_kms_region: ""
      # Secret holding the static master key and/or Vault token, injected via
      # secretKeyRef (NEVER a ConfigMap). Required for static + vault_transit.
      existingSecret: ""
      staticKeyKey: static_key
      vaultTokenKey: vault_token

    # Artifact Retention — periodic cleanup of old artifacts from object storage.
    # When enabled, a background task runs at the configured interval and removes
    # artifacts that exceed their retention thresholds.  Cache entries (provider
    # and binary) are cleaned based on last-access time, not creation time.
    artifact_retention:
      enabled: true
      poll_interval_seconds: 86400   # daily
      batch_size: 100
      state_versions_keep: 20       # per workspace; 0 = disabled
      run_artifacts_retention_days: 90
      config_versions_retention_days: 90
      provider_cache_retention_days: 30   # days since last access
      binary_cache_retention_days: 30     # days since last access
      module_overrides_retention_days: 14

    # CORS
    cors:
      allow_origins: []

  # Rolling update strategy — surge before killing to avoid downtime at any replica count.
  strategy:
    maxSurge: 1
    maxUnavailable: 0

  terminationGracePeriodSeconds: 120
  # Seconds to sleep in preStop before SIGTERM reaches uvicorn. Gives the
  # ingress controller + kube-proxy time to remove the pod from the Service
  # endpoints so in-flight and newly-arriving requests drain to the surviving
  # replica instead of hitting a pod that's about to shut down. 30s covers
  # typical kube-proxy + Traefik propagation; bump higher if your ingress
  # has slower endpoint convergence.
  preStopSleepSeconds: 30

  # Per-pod ephemeral storage for VCS archive streaming. Each api pod replica
  # gets its own PVC (generic ephemeral volume → auto-deleted on pod removal).
  # Required because the VCS poller streams multi-hundred-MB monorepo tarballs
  # through this path during download → strip → upload; without it the api
  # pod OOM-kills under multi-workspace polling of the same repo.
  #
  # Sizing: each concurrent workspace poll holds raw + stripped tarball on
  # disk simultaneously (~2× tarball size). With the default 10 parallel
  # workspace polls and a 500 MB monorepo, peak usage is ~10 GB just for
  # in-flight downloads — plus the cached stripped tarballs from prior
  # cycles waiting for the retention sweeper. 50 GiB is the safe default;
  # bump it for fleets with bigger monorepos or more parallel workspaces.
  #
  # Disable only if you can guarantee no large monorepo workspaces (e.g. tests,
  # local dev — values-local.yaml does this). The poller will fall back to the
  # system tempdir, but tmpfs-backed /tmp on most images is too small.
  ephemeralStorage:
    enabled: true
    size: 50Gi
    # Empty string = cluster default StorageClass. Some default classes (e.g.
    # k3s-rancher-default with `Retain` reclaim, or AWS EKS's `xfs-retain`)
    # leave PVs hanging around after the pod dies, which defeats "ephemeral".
    # Set this to a class with `Delete` reclaim policy. See docs/deployment.md
    # for k3s + AWS guidance.
    storageClass: ""
    mountPath: /var/lib/terrapod/tmp

  # Pod anti-affinity spreads replicas across nodes (required) and AZs (preferred).
  # Disable on single-node clusters. Set 'affinity' to override with custom rules.
  podAntiAffinity:
    enabled: true

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  priorityClassName: ""
  topologySpreadConstraints: []

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault

  # Extra labels added to pod metadata (e.g. for Istio, Linkerd, etc.)
  podLabels: {}

  # Extra environment variables, volumes, and mounts for the API container.
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  # Extra init and sidecar containers
  extraInitContainers: []
  extraContainers: []

  serviceAccount:
    create: true
    name: ""
    # Annotations for cloud provider workload identity:
    #
    # AWS IRSA:
    #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/terrapod-api
    #
    # Azure Workload Identity:
    #   azure.workload.identity/client-id: <managed-identity-client-id>
    #
    # GCP Workload Identity Federation:
    #   iam.gke.io/gcp-service-account: terrapod@project.iam.gserviceaccount.com
    annotations: {}

# ── Logical PostgreSQL backup + DR drill (#545) ───────────────────────────────
# OFF by default. A standard deployment already has both halves a backup needs
# (a Postgres URL + an object-storage backend), so enabling this needs no new
# infra or credentials: a CronJob runs `pg_dump` and streams the dump to the
# configured object store under `prefix`, inheriting the bucket's at-rest
# encryption and the API ServiceAccount's cloud workload identity.
#
# This is a LOGICAL dump — RPO is the dump interval, not point-in-time — and is
# the baseline floor, not a replacement for RDS snapshots / WAL-G / pgBackRest
# for serious-RPO deployments. To keep the only backup out of the app data's
# blast radius, enable object-store cross-region replication on the destination
# bucket (see docs/disaster-recovery.md) rather than dual-writing app-side.
backup:
  enabled: false
  schedule: "0 2 * * *"          # daily at 02:00 (cluster TZ)
  prefix: "backups/"             # object-store key prefix for dumps
  retention:
    keep: 0                      # keep N most-recent backups (0 = keep all)
    days: 0                      # delete backups older than N days (0 = disabled)
  backoffLimit: 2
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  resources: {}
  # DR drill — restore the latest backup into a THROWAWAY sidecar Postgres
  # (never the live DB) and assert core invariants. A tested restore beats a
  # documented one. Run on demand with:
  #   kubectl create job --from=cronjob/<release>-terrapod-restore-verify drill-now
  restoreVerify:
    enabled: false
    schedule: "0 4 * * 0"        # weekly, Sundays at 04:00
    postgresImage: "postgres:17-alpine"
    backoffLimit: 1
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    resources: {}
    postgresResources: {}

# ── Cloud-identity preflight doctor (#571) ────────────────────────────────────
# OFF by default. When enabled, runs as a Helm post-install/upgrade hook so a
# misconfigured OIDC trust policy / SA binding fails the install LOUDLY instead
# of the first run failing cryptically. Two Jobs: the API ServiceAccount
# (storage read + cloud identity + DB connect) and the runner ServiceAccount
# (cloud identity only). A failing hook fails `helm install/upgrade` — that's the
# point. Also runnable on demand via `make preflight-identity`.
preflight:
  enabled: false
  checkRunner: true              # also probe the runner SA's cloud identity
  hook: "post-install,post-upgrade"
  hookWeight: "5"
  backoffLimit: 0
  resources: {}

# ── Web UI (Next.js) ──────────────────────────────────────────────────────────
# The web frontend is the BFF (Backend-For-Frontend): all browser, CLI, and
# listener traffic enters through it and is proxied to the API. The Ingress
# routes here, so it is enabled by default alongside the API and listener.
web:
  enabled: true

  replicas: 2

  image:
    repository: ghcr.io/mattrobinsonsre/terrapod-web
    tag: ""  # Defaults to appVersion
    pullPolicy: IfNotPresent

  # HSTS (Strict-Transport-Security) header sent on every BFF response.
  # On by default — Terrapod's deployed model is HTTPS-only and many
  # ingress controllers (notably Tailscale) don't listen on port 80, so
  # a typo like `http://<hostname>` would otherwise just fail. The
  # header tells browsers to upgrade `http://<hostname>` to
  # `https://<hostname>` for `max-age` seconds after the first HTTPS
  # visit.
  #
  # Default `max-age=63072000` is 2 years. No `includeSubDomains`:
  # Terrapod's hostname's parent zone (e.g. `ts.net`, a corporate
  # internal zone) is almost always shared with sibling services that
  # have their own HTTP policies — asserting the directive would force
  # HTTPS on all of them, which is the deploying operator's call.
  # No `preload`: that's a one-way commitment to the hsts-preload list.
  #
  # Set `value: ""` to disable the header entirely (e.g. dev or mixed
  # http/https deployments). Operators who DO own the entire parent
  # zone and want the broader assertion can add `; includeSubDomains`
  # (and optionally `; preload`) explicitly.
  hsts:
    value: "max-age=63072000"

  # Service configuration
  service:
    type: ClusterIP
    annotations: {}

  # Probe overrides — template provides sensible defaults for all probe timings.
  # Set individual fields to override (e.g., startupProbe.failureThreshold: 20).
  startupProbe: {}
  livenessProbe: {}
  readinessProbe: {}

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  pdb:
    enabled: true
    maxUnavailable: 1

  # Rolling update strategy — surge before killing to avoid downtime at any replica count.
  strategy:
    maxSurge: 1
    maxUnavailable: 0

  # Bumped from 30 to 60 so the preStop drain (default 30s) fits comfortably
  # within the grace period with room for in-flight Next.js SSR requests.
  terminationGracePeriodSeconds: 60
  # See the matching comment on api.preStopSleepSeconds — same purpose: let the
  # ingress / kube-proxy remove the pod from endpoints before Next.js begins
  # its shutdown. Prevents the rollout from dropping BFF-proxied API calls +
  # SSE connections held by users.
  preStopSleepSeconds: 30

  # Pod anti-affinity spreads replicas across nodes (required) and AZs (preferred).
  # Disable on single-node clusters. Set 'affinity' to override with custom rules.
  podAntiAffinity:
    enabled: true

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  priorityClassName: ""
  topologySpreadConstraints: []

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault

  # Extra labels added to pod metadata (e.g. for Istio, Linkerd, etc.)
  podLabels: {}

  # Extra environment variables, volumes, and mounts for the web container.
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  # Extra init and sidecar containers
  extraInitContainers: []
  extraContainers: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}

# ── Runner Configuration ─────────────────────────────────────────────────────
runners:
  # Runner job container image (generic runner — binary fetched at runtime)
  image:
    repository: ghcr.io/mattrobinsonsre/terrapod-runner
    tag: ""  # defaults to appVersion
    pullPolicy: IfNotPresent

  # Internal API URL for runner Jobs. Runner pods use this to reach the API
  # for presigned storage URLs. Defaults to http://<release>-api:8000.
  serverUrl: ""

  # Image pull secrets for runner Jobs (private registries).
  # These are separate from global.imagePullSecrets which only cover
  # Helm-managed workloads. Runner Jobs are created dynamically by the
  # listener and need their own pull secrets.
  imagePullSecrets: []
  # Example:
  #   imagePullSecrets:
  #     - my-registry-secret

  # Extra environment variables injected into all runner Jobs.
  # Supports literal values and valueFrom (secretKeyRef, configMapKeyRef).
  extraEnv: []
  # Example:
  #   extraEnv:
  #     - name: AWS_DEFAULT_REGION
  #       value: eu-west-1
  #     - name: AWS_ACCESS_KEY_ID
  #       valueFrom:
  #         secretKeyRef:
  #           name: aws-credentials
  #           key: access-key-id

  # Inject all keys from Secrets or ConfigMaps as env vars on runner Jobs.
  extraEnvFrom: []
  # Example:
  #   extraEnvFrom:
  #     - secretRef:
  #         name: aws-credentials
  #     - configMapRef:
  #         name: runner-config

  # Shared Job settings
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  priorityClassName: ""
  topologySpreadConstraints: []
  podSecurityContext: {}
  ttlSecondsAfterFinished: 600  # Clean up completed Jobs after 10 min
  terminationGracePeriodSeconds: 120  # Time budget for graceful shutdown + artifact uploads
  tokenTTLSeconds: 3600         # Runner token TTL (default 1 hour)
  maxTokenTTLSeconds: 7200      # Runner token max TTL (default 2 hours)
  staleTimeoutSeconds: 3600     # Seconds before a run with no Job status is marked errored
  # Seconds before a claimed run with no Job launched is errored (listener
  # claimed it but never created the Job — e.g. runner-token 401, K8s outage).
  launchTimeoutSeconds: 300
  # Default terraform/tofu version + backend for runner Jobs when a workspace
  # doesn't pin one. Runs snapshot the resolved version at creation time.
  defaultTerraformVersion: "1.12"
  defaultExecutionBackend: "tofu"  # tofu | terraform
  # Maximum wall-clock seconds a drift-detection run may spend in `planning`
  # before the reconciler errors it out. Independent of staleTimeoutSeconds:
  # that one fires on listeners going dark; this one fires on terraform
  # legitimately running too long for a background drift check (e.g. a
  # github-provider state refresh that takes hours on a workspace with
  # hundreds of rate-limited reads). Drift runs are plan-only and
  # background-priority — a 30-minute cap is a generous SLO for "tell me
  # if there's drift". Set to 0 to disable the cap.
  driftMaxDurationSeconds: 1800

  # Auto-retry for FAILED platform-initiated lifecycle destroys (a catalog
  # instance destroy or an autodiscovery directory destroy). terraform destroy
  # is commonly transiently flaky (dependency-release ordering, eventual
  # consistency, draining LBs / releasing ENIs / emptying buckets); a re-run
  # usually succeeds and re-running is safe (destroy is incremental). The
  # workspace is archived only on a SUCCESSFUL destroy, so retries never lose
  # data — they either succeed and archive or exhaust the cap and stay errored
  # for an operator. A user's own CLI `terraform destroy` is never retried.
  # Set lifecycleDestroyRetries to 0 to disable.
  lifecycleDestroyRetries: 2            # retries after the first failure (3 attempts total)
  lifecycleDestroyRetryBackoffSeconds: 45  # wait after an error before retrying

  # Execution hooks (#619): kill-switch for operator-defined custom-shell steps
  # run inside runner Jobs at fixed points (pre_init/pre_plan/post_plan/
  # pre_apply/post_apply). Hooks are an admin-managed library associated with
  # workspaces via the API. When false, the listener drops all resolved hooks
  # before building the Job, so no custom shell runs in the runner — for
  # security-conscious / sealed deployments that forbid arbitrary hook scripts.
  hooksEnabled: true

  # Maximum size in bytes of the plan-phase workspace-diff tarball that
  # the runner uploads at end of plan and downloads at start of apply.
  # That tarball restores files plan generated on disk (data.archive_file
  # outputs, null_resource local-exec scratch, etc.) that would otherwise
  # be missing in the apply pod's fresh workspace. Uploads exceeding
  # this size are rejected with HTTP 413; the runner logs the rejection
  # and apply will then fail on the resource that depended on the
  # missing file (no worse than the pre-feature behaviour).
  # Default 256 MiB (256 * 1024 * 1024 = 268435456).
  planArtifactsMaxBytes: 268435456

  # ServiceAccount for runner Jobs (cloud workload identity)
  serviceAccount:
    # Set to false to use a pre-existing SA managed externally
    # (e.g. created by Terraform, eksctl, or az identity)
    create: true
    # SA name. Defaults to "<release>-runner" when create=true.
    # When create=false, must reference an existing SA in the runner namespace.
    name: ""
    # Annotations for cloud workload identity:
    #
    # AWS IRSA:
    #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/terrapod-runner
    #
    # Azure Workload Identity:
    #   azure.workload.identity/client-id: <managed-identity-client-id>
    #
    # GCP Workload Identity Federation:
    #   iam.gke.io/gcp-service-account: terrapod-runner@project.iam.gserviceaccount.com
    annotations: {}

  # Azure Workload Identity requires a pod label on runner Jobs.
  # Enable this when using Azure WI — harmless on non-Azure clusters.
  azureWorkloadIdentity: false

# ── Runner Listener ──────────────────────────────────────────────────────────
# Multiple replicas are supported. Each pod registers as an independent
# listener with a unique name derived from its pod hostname. All replicas
# in a pool compete for queued runs via atomic Postgres locking.
listener:
  enabled: true
  replicas: 1

  image:
    repository: ghcr.io/mattrobinsonsre/terrapod-listener
    tag: ""  # Defaults to appVersion
    pullPolicy: IfNotPresent
  # Listener identity. ALL pods of this Deployment share this single name —
  # they coordinate via a K8s Secret named "{name}-credentials" in the
  # release namespace, store the X.509 cert there, and rotate it at 50%
  # of `runners.listenerCertTtlSeconds` plus a per-pod splay. Multiple
  # pods running concurrently is supported; coordination uses the
  # existing pool-level pub/sub + the run-claim DB lock + the Secret CAS
  # for cert renewal.
  name: "listener"
  # Port for /health and /ready HTTP probe endpoints
  healthPort: 8081

  # API URL for the listener to connect to. Leave empty when the API runs in
  # the same release (auto-detected as http://<release>-api:8000).
  # Set for agent-only deployments where the API is in a different cluster:
  #   apiUrl: "https://terrapod.example.com"
  # Also used as the default for runners.serverUrl when that value is empty.
  apiUrl: ""

  # Public/canonical API URL — the hostname users see in their browsers,
  # the CLI cloud block, and in module/provider `source = "..."` URLs.
  # Distinct from `apiUrl` (the URL the listener and runner pods actually
  # call). When set AND different from `apiUrl`, the runner auto-generates
  # a terraform CLI `host{}` block redirecting the public hostname to the
  # internal one, so user code can keep referring to the canonical
  # hostname while runners traverse the internal route.
  #
  # Defaults to `api.config.external_url` (the chart-wide public URL) when
  # unset. Leave empty in single-network deployments where the listener
  # reaches the same hostname users do.
  #
  # See docs/deployment-network-isolation.md for the full pattern.
  publicApiUrl: ""

  # Listener tuning — non-sensitive, delivered via the runner ConfigMap
  # (runners.yaml → RunnerConfig), not Deployment env (#617). Defaults are
  # sane; override per cluster as needed.
  heartbeatInterval: 60   # Seconds between listener heartbeats (Redis TTL is 300).
  maxConcurrent: 3        # Max concurrent run launches per listener pod.
  pollInterval: 30        # Fallback poll interval when SSE is idle (s).
  sseReadTimeout: 30      # SSE silence beyond this reconnects (keepalive is 1s).
  sseMaxAge: 600          # Proactive SSE reconnect interval (s).
  sseRetryInterval: 5     # Backoff between SSE reconnect attempts (s).

  # Join token for pool registration.
  # Either set joinToken directly or reference an existing K8s Secret (recommended).
  # The token is obtained by creating an agent pool + join token via the API.
  joinToken: ""
  # existingSecret: "my-listener-credentials"
  # joinTokenKey: "join_token"  # key within the Secret (default: join_token)

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Namespace where runner Jobs are created (defaults to release namespace)
  runnerNamespace: ""

  # ServiceAccount for the listener Deployment
  serviceAccount:
    # Set to false to use a pre-existing SA
    create: true
    name: ""
    # Annotations for cloud workload identity (if listener needs
    # direct cloud access, e.g. for object storage):
    annotations: {}

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  pdb:
    enabled: true
    maxUnavailable: 1

  # Rolling update strategy. maxUnavailable=1 + maxSurge=0 + minReadySeconds=30
  # roll one pod at a time, with a 30s settle window before the next pod is
  # touched. Combined with the per-pod cert-renewal splay this keeps cert
  # rotation cycles across the deployment unaligned, so at most one /renew
  # call goes through the API per cycle in steady state.
  strategy:
    maxSurge: 0
    maxUnavailable: 1
  minReadySeconds: 30

  terminationGracePeriodSeconds: 120
  # Listeners are stateless event bridges to K8s; the API server can tolerate
  # brief listener churn. 15s is enough for the SSE and heartbeat loops on
  # other replicas to notice and rebalance before this one shuts down.
  preStopSleepSeconds: 15

  # Pod anti-affinity spreads replicas across nodes (required) and AZs (preferred).
  # Disable on single-node clusters. Set 'affinity' to override with custom rules.
  podAntiAffinity:
    enabled: true

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  priorityClassName: ""
  topologySpreadConstraints: []

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault

  # Extra labels added to pod metadata (e.g. for Istio, Linkerd, etc.)
  podLabels: {}

  # Extra environment variables, volumes, and mounts for the listener container.
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  # Extra init and sidecar containers
  extraInitContainers: []
  extraContainers: []

# ── Ingress ───────────────────────────────────────────────────────────────────
# BFF pattern: all traffic enters through the web frontend (Next.js).
# Next.js rewrites proxy /api/* and /.well-known/* to the API service
# internally via the API_URL env var on the web deployment.
# NOTE: Requires web.enabled=true — the Ingress routes to the web frontend.
ingress:
  enabled: false
  className: ""
  hostname: ""  # Required: e.g., terrapod.example.com
  tls: true
  pathType: Prefix
  annotations: {}
  # Extra paths prepended before the default catch-all path.
  # Useful for custom backends (e.g. SSL redirect, health check ALB target).
  extraPaths: []
  # - path: /healthz
  #   pathType: Exact
  #   backend:
  #     service:
  #       name: my-health-service
  #       port:
  #         name: http

# ── Webhook Ingress (optional) ────────────────────────────────────────────────
# Optional SECOND Ingress for the public-internet-inbound surface only:
# VCS webhooks and run-task callbacks. Lets operators keep the management
# plane (UI, admin API, CLI, SSO callback, state uploads, the whole BFF)
# on a private/restricted ingress while exposing only the must-be-public
# webhook receivers separately.
#
# Mechanism-agnostic: set `className` to whatever Ingress controller
# handles the public surface — `nginx`, `alb`, `tailscale`, `cloudflare`,
# etc. — and pass any mechanism-specific options via `annotations`. The
# chart wires the path allow-list; the operator wires the reachability.
#
# Without this block (default), all traffic — including webhooks — has to
# go through `ingress` above. That's fine for deployments where the
# management plane is itself public; the split exists for the case where
# it isn't.
#
# Server-side, `api.config.public_webhook_url` is auto-derived from this
# block's hostname so the URLs Terrapod hands out to external services
# (VCS webhook URL in the connection edit screen, run-task callback URL
# in the dispatched webhook payload) point at the public hostname rather
# than the private management one. Operators can override explicitly via
# `api.config.public_webhook_url`.
webhookIngress:
  enabled: false
  className: ""
  hostname: ""  # Required when enabled: e.g., terrapod-webhooks.example.com
  tls: true
  pathType: Prefix
  annotations: {}
  # Path allow-list. Each entry is rendered as a separate `path:` rule
  # routing to the web Service (the BFF). Defaults to the full set of
  # inbound-from-public-internet endpoints Terrapod exposes; operators
  # who don't use external run tasks can trim that out.
  paths:
    - /api/terrapod/v1/vcs-events       # GitHub / GitLab webhook receivers
    - /api/terrapod/v1/task-stage-results # external run-task callback receiver

# ── Internal Ingress (optional) ─────────────────────────────────────────────
# Optional THIRD Ingress for the internal-only surface: listener pods
# joining + heartbeating, runner Jobs uploading artifacts and pulling the
# binary/provider/module caches. Use this when listener and runner pods
# live in clusters that cannot reach the primary `ingress` hostname (e.g.
# the management plane is on a Tailscale/VPN ingress that pod networks
# don't traverse, but a private LB or internal LB shared across the VPC
# fabric is reachable).
#
# Mechanism-agnostic — same as `webhookIngress`. Set `className` to your
# internal Ingress controller (`traefik-internal`, internal-only nginx,
# `alb` with `scheme: internal`, etc.) and pass operator-specific options
# via `annotations`.
#
# Three audiences, three Ingresses, one BFF:
#
#   ingress         → humans (UI), CLI cloud block, SSO redirect
#   webhookIngress  → public-must-reach (VCS webhooks, run-task callbacks)
#   internalIngress → listener + runner traffic from other clusters
#
# All three terminate at `<fullname>-web` (the BFF). The difference is
# WHERE the request landed, not what it does. Listener auth (bearer cert)
# and runner-token auth still apply on every endpoint.
#
# When this block is enabled, set `listener.publicApiUrl` (or leave it
# unset to default to `api.config.external_url`) so the runner knows that
# the public hostname in user `.tf` code (e.g. `source = "..."` registry
# URLs) differs from `listener.apiUrl` — the runner auto-generates a
# terraform `host{}` block redirecting the public hostname to the
# internal URL it actually calls. See docs/deployment-network-isolation.md.
internalIngress:
  enabled: false
  className: ""
  hostname: ""  # Required when enabled: e.g., terrapod-internal.example.com
  tls: true
  # Name of an existing TLS Secret to reuse (e.g. a wildcard cert
  # covering both the public and internal hostnames). If empty, the
  # chart uses `<fullname>-internal-tls` (typically issued by
  # cert-manager via the annotations below).
  existingSecret: ""
  pathType: Prefix
  annotations: {}
  # Path allow-list. Defaults to all paths — this Ingress is the internal-
  # trusted route, so there's no security reason to restrict it. Operators
  # can narrow if their controller requires explicit path declarations.
  paths:
    - /
  # Extra paths prepended before the path allow-list above. Same shape
  # and use as `ingress.extraPaths` (e.g. a controller-specific health-
  # check path that needs an explicit backend).
  extraPaths: []

# ── TLS ───────────────────────────────────────────────────────────────────────
tls:
  # Name of an existing TLS Secret. If empty, uses <fullname>-tls.
  existingSecret: ""

# ── Migrations ────────────────────────────────────────────────────────────────
migrations:
  enabled: true

  image:
    repository: ghcr.io/mattrobinsonsre/terrapod-migrations
    tag: ""  # Defaults to appVersion
    pullPolicy: IfNotPresent

  # Job retry budget. The migrations Job is a pre-install/pre-upgrade hook; when
  # the database is co-deployed in the same release (eval/dev embedded Postgres,
  # postgresql.deploy=true) it may still be starting when the hook first runs, so
  # the Job retries with exponential backoff until the DB is reachable. Harmless
  # for an already-up managed database in production.
  backoffLimit: 10

# ── Bootstrap (initial admin user + optional pool) ─────────────────────────
# The bootstrap Job is a post-install hook that idempotently seeds the admin
# user (+ an optional agent pool). NOTE: ArgoCD runs post-install hooks on
# every Sync, so on an established deployment (admin already exists) it just
# re-runs as a no-op — set `enabled: false` to stop it once seeded.
# bootstrap:
#   enabled: true      # set false to skip the bootstrap Job (admin already seeded)
#   adminEmail: admin@example.com
#   adminPassword: ""  # Required when enabled
#   existingSecret: ""  # Alternative: reference an existing K8s Secret
#   emailKey: email
#   passwordKey: password
#   poolName: ""       # Optional: auto-create an agent pool with this name
#   poolToken: ""      # Optional: auto-create a join token for the pool
#   hook: ""           # Helm hook phase (default "post-install"). Set to
#                      # "pre-install,pre-upgrade" with hookWeight "-3" to create
#                      # the admin/pool BEFORE the listener rolls out — required if
#                      # you enable the listener with a bootstrap-created pool AND
#                      # install with `helm --wait` (otherwise --wait deadlocks on
#                      # the listener's pool-join readiness). The eval profile does
#                      # this; production defaults keep the historical post-install.
#   hookWeight: ""     # Helm hook-weight (default "10")

# ── Database (PostgreSQL) ─────────────────────────────────────────────────────
# Provide credentials via existingSecret (recommended) or url (dev only).
postgresql:
  url: ""
  # existingSecret: "terrapod-db-credentials"
  # existingSecretKey: "url"  # key within the Secret (default: url)

  # ── Embedded PostgreSQL — EVAL / DEV ONLY ──────────────────────────────
  # When true, the chart deploys a single-replica in-cluster PostgreSQL and
  # wires the API/migrations/bootstrap to it automatically (no url/existingSecret
  # needed). This exists so the stack can run with ZERO external dependencies
  # for local evaluation (`make eval`) and the Tilt dev loop. It is NOT
  # production-grade — one replica, no HA, no backups, no tuning. For production,
  # keep this false and provide a managed database via url / existingSecret.
  deploy: false
  embedded:
    image: postgres:16-alpine
    # A fixed password for the embedded DB (eval only). Leave empty to have the
    # chart generate one (stable across upgrades via a lookup on the Secret).
    password: ""
    persistence:
      size: 1Gi
      storageClass: ""   # "" = cluster default StorageClass (kind/k3d ship one)
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

# ── Redis ─────────────────────────────────────────────────────────────────
# Provide credentials via existingSecret (recommended) or url (dev only).
redis:
  url: ""
  # existingSecret: "terrapod-redis-credentials"
  # existingSecretKey: "url"  # key within the Secret (default: url)

  # ── Embedded Redis — EVAL / DEV ONLY ───────────────────────────────────
  # When true, the chart deploys a single-replica in-cluster Redis and points
  # the API at it automatically. Same caveat as embedded PostgreSQL above:
  # eval/dev only (no auth, no persistence, no HA). Production should keep this
  # false and provide a managed Redis/Valkey via url / existingSecret.
  deploy: false
  embedded:
    image: redis:7-alpine
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

# ── Storage ─────────────────────────────────────────────────────────────────
# Filesystem PVC — only created when storage.backend=filesystem
storage:
  filesystem:
    persistence:
      enabled: true
      size: 50Gi
      storageClass: ""
      accessModes:
        - ReadWriteOnce

# ── Network Policies ────────────────────────────────────────────────────────
# Restrict pod-to-pod and pod-to-external traffic.
# Requires a CNI plugin that supports NetworkPolicy (Calico, Cilium, etc.).
networkPolicies:
  enabled: false

# ── Namespace ───────────────────────────────────────────────────────────────
# Optionally create the namespace with Pod Security Standards labels.
# Example labels for PSS restricted profile:
#   pod-security.kubernetes.io/enforce: restricted
#   pod-security.kubernetes.io/audit: restricted
#   pod-security.kubernetes.io/warn: restricted
namespace:
  create: false
  labels: {}

# ── Egress: forward proxy + custom CA trust (restricted-network deployments) ──
# proxy.* and caBundle.* are a matched pair for high-security / restricted-egress
# networks where outbound traffic must egress via a forward proxy and/or TLS
# terminates against internal/corporate CAs — including a TLS-intercepting "MITM"
# proxy presenting its OWN CA. They apply to EVERY component that makes outbound
# calls: the API, web/BFF, listener, the migrations + bootstrap Jobs, and the
# runner Jobs (so terraform/tofu provider+module fetches egress through the proxy
# and trust the CA too). See docs/deployment-proxy.md.

# Forward proxy. When enabled, BOTH upper- and lower-case env vars
# (HTTP_PROXY/http_proxy, HTTPS_PROXY/https_proxy, NO_PROXY/no_proxy) are injected
# into every component — different runtimes (Python httpx/requests, Go,
# terraform/tofu, curl, cloud SDKs) read different cases. The chart APPENDS
# cluster-internal destinations to noProxy automatically (localhost, 127.0.0.1,
# .svc, .svc.cluster.local, .cluster.local, the in-cluster service names) so
# internal traffic is never proxied. Add cloud metadata (169.254.169.254) and any
# object-store/STS endpoints that must bypass the proxy to noProxy yourself.
proxy:
  enabled: false
  httpProxy: ""                   # e.g. http://proxy.internal:3128
  httpsProxy: ""                  # e.g. http://proxy.internal:3128 (often the same as httpProxy)
  noProxy: []                     # extra no_proxy entries; cluster-internal defaults are appended

# Custom CA trust bundle for OUTBOUND TLS (corporate roots, internal registries /
# VCS / artifact stores, and a TLS-intercepting proxy's MITM CA). For the Python/
# Go/git components an init container MERGES the supplied CA(s) with the image's
# system roots into one bundle on a shared emptyDir, so the app trusts BOTH public
# and corporate/proxy CAs (a replacement bundle would drop the public roots and
# break public endpoints); the merged bundle is wired via SSL_CERT_FILE /
# REQUESTS_CA_BUNDLE / CURL_CA_BUNDLE (Python, curl, Go, terraform/tofu) and
# GIT_SSL_CAINFO (git). The web/BFF (Node) trusts it via NODE_EXTRA_CA_CERTS, which
# APPENDS to Node's built-in roots (no merge needed). A CA bundle is public,
# non-secret material — prefer a ConfigMap. This is SEPARATE from api.databaseCA,
# which verifies the database SERVER cert specifically; caBundle is general
# outbound trust. See docs/deployment-proxy.md for how the two interact.
caBundle:
  enabled: false
  inline: ""                      # paste the extra CA PEM(s) here; the chart creates a ConfigMap
  existingConfigMap: ""           # OR reference an existing ConfigMap holding the CA bundle
  existingSecret: ""              # OR an existing Secret holding the CA bundle
  key: ca-extra.pem               # key within the ConfigMap/Secret (the supplied CA filename)
