# Terrapod Helm Chart Values
# Default configuration for production deployment
#
# SCHEMA CONTRACT: This file is validated against values.schema.json.
# When adding or renaming a key here, update values.schema.json to match.
# CI enforces this via `helm lint` (which validates against the schema).

nameOverride: ""
fullnameOverride: ""

# Global settings
global:
  # imageRegistry overrides the registry portion (ghcr.io) of all Terrapod image
  # references. Useful for ECR pull-through cache or private mirrors.
  # Example for ECR pull-through:
  #   imageRegistry: "123456789012.dkr.ecr.eu-west-1.amazonaws.com/ghcr"
  # This rewrites ghcr.io/mattrobinsonsre/terrapod-api to:
  #   123456789012.dkr.ecr.eu-west-1.amazonaws.com/ghcr/mattrobinsonsre/terrapod-api
  imageRegistry: ""
  # imagePullSecrets:
  #   - name: myregistrykey
  imagePullSecrets: []
  # Extra labels applied to all resources (Deployments, Services, Ingress, etc.)
  commonLabels: {}

# ── API Server (Python/FastAPI) ───────────────────────────────────────────────
api:
  # Set to false for agent-only deployments (listener + runners in a remote
  # cluster, API running elsewhere). When false, the API Deployment, Service,
  # ConfigMap, ServiceAccount, and storage PVC are not rendered.
  enabled: true

  # Filesystem storage (default) only supports a single replica.
  # For multi-replica HA, configure a cloud storage backend (s3, azure, gcs).
  replicas: 1

  image:
    repository: ghcr.io/mattrobinsonsre/terrapod-api
    tag: ""  # Defaults to appVersion
    pullPolicy: IfNotPresent

  # Override the container command (e.g., for hot reload in dev):
  # command: ["uvicorn", "terrapod.api.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
  command: []

  # Service configuration
  service:
    type: ClusterIP
    annotations: {}

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  autoscaling:
    # Disabled by default — filesystem storage does not support multi-replica.
    # Enable after configuring a cloud storage backend (s3, azure, gcs).
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  pdb:
    enabled: true
    maxUnavailable: 1

  # Configuration mounted as /etc/terrapod/config.yaml
  config:
    log_level: info

    # Public-facing Terrapod URL (the Next.js frontend ingress).
    # Used for VCS commit status links, notification URLs, and any
    # outbound references back to the UI. Example: https://terrapod.example.com
    external_url: ""

    # SQLAlchemy connection pool settings for RDS Proxy / pgBouncer compatibility.
    # Tune these if using a connection pooler or high-availability PostgreSQL.
    database:
      pool_size: 10            # Persistent connections in pool
      max_overflow: 20         # Extra connections beyond pool_size
      pool_pre_ping: true      # SELECT 1 before checkout (handles stale connections)
      pool_recycle: 1800       # Recycle connections after N seconds (below proxy max lifetime)
      pool_timeout: 30         # Seconds to wait for a pool connection
      connect_timeout: 10      # TCP connect timeout in seconds
      command_timeout: 30      # Query timeout in seconds

    # Default execution backend and version for new workspaces
    default_execution_backend: tofu  # tofu | terraform
    default_terraform_version: "1.11"

    # Storage configuration — exactly one backend must be configured.
    # IMPORTANT: Filesystem storage is for dev/single-instance only.
    # For multi-replica HA, use a cloud backend (s3, azure, gcs).
    storage:
      # Backend: s3 | azure | gcs | filesystem
      backend: filesystem

      # AWS S3
      s3:
        bucket: ""
        region: us-east-1
        prefix: ""
        endpoint_url: ""
        presigned_url_expiry_seconds: 3600

      # Azure Blob Storage
      azure:
        account_name: ""
        container_name: ""
        prefix: ""
        presigned_url_expiry_seconds: 3600

      # Google Cloud Storage
      gcs:
        bucket: ""
        prefix: ""
        project_id: ""
        service_account_email: ""
        presigned_url_expiry_seconds: 3600

      # Local filesystem (default — for dev/CI)
      filesystem:
        root_dir: /var/lib/terrapod/storage
        presigned_url_expiry_seconds: 3600
        base_url: ""  # Auto-detected from ingress hostname if empty

    # Authentication
    auth:
      local_enabled: true

      # Public callback URL for SSO redirects. Required when SSO is enabled.
      # Must be the externally-reachable URL of your Terrapod instance.
      # The IDP callback lands at {callback_base_url}/api/v2/auth/callback.
      callback_base_url: ""

      session_ttl_hours: 12
      api_token_max_ttl_hours: 8760  # 1 year; 0 = no limit
      require_external_sso_for_roles: []

      # ── SSO / Identity Providers ──────────────────────────────────────
      # Client secrets are NEVER stored in this config or the ConfigMap.
      # For each OIDC provider, the deployment template injects an env var
      # TERRAPOD_{NAME}_CLIENT_SECRET from a K8s Secret via secretKeyRef.
      # Create the secret before deploying:
      #   kubectl create secret generic <existingSecret> \
      #     --from-literal=client_secret=<your-client-secret>
      sso:
        # Name of the default SSO provider (used when no provider is specified).
        # Must match the "name" of one of the providers below.
        default_provider: ""

        # ── OIDC Providers ────────────────────────────────────────────
        oidc: []
        # Example (Auth0):
        # - name: auth0
        #   display_name: "Auth0"           # Label shown on login button
        #   issuer_url: https://myorg.auth0.com/
        #   client_id: "your-client-id"
        #   scopes: ["openid", "profile", "email"]
        #   audience: ""                     # API audience (Auth0/Okta); omit if unused
        #   groups_claim: groups             # Claim name containing user groups
        #   role_prefixes: ["terrapod:", "terrapod-"]  # Stripped from group names
        #   # K8s Secret containing the client_secret:
        #   existingSecret: "terrapod-auth0"
        #   existingSecretKey: "client_secret"   # Key within the Secret

        # ── SAML Providers ────────────────────────────────────────────
        saml: []
        # Note: SAML providers authenticate via metadata URL exchange — no client
        # secret is needed. Unlike OIDC, there is no secretKeyRef injection for SAML.
        # Example (Azure AD SAML):
        # - name: azure-ad
        #   display_name: "Azure AD"
        #   metadata_url: https://login.microsoftonline.com/<tenant>/federationmetadata/2007-06/federationmetadata.xml
        #   entity_id: "https://terrapod.example.com"
        #   role_prefixes: ["terrapod:", "terrapod-"]

    # Private Registry & Caching
    registry:
      enabled: true
      provider_cache:
        enabled: true
        upstream_registries:
          - registry.terraform.io
          - registry.opentofu.org
        warm_on_first_request: true
        platforms:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
      binary_cache:
        enabled: true
        terraform_mirror_url: "https://releases.hashicorp.com/terraform"
        tofu_mirror_url: "https://github.com/opentofu/opentofu/releases/download"

    # GPG signing key for provider registry
    # ASCII-armored GPG private key. If set, used to sign all provider SHA256SUMS.
    # If empty, a key is auto-generated on first provider upload.
    # In production, inject from K8s Secret via TERRAPOD_REGISTRY__SIGNING_KEY env var
    # registry:
    #   signing_key: ""

    # VCS Integration
    # VCS connections (GitHub App installations, GitLab tokens) are created
    # dynamically via the API. All credentials are stored on the connection
    # itself — no secrets in Helm values.
    vcs:
      enabled: true
      poll_interval_seconds: 60
      github:
        # Optional: K8s Secret containing the webhook HMAC secret.
        # Only needed if GitHub webhooks are enabled for faster feedback.
        existingSecret: ""
        existingSecretKey: "webhook_secret"

    # Audit logging
    audit:
      retention_days: 90

    # Drift Detection — scheduled plan-only runs to detect infrastructure drift
    drift_detection:
      enabled: true
      poll_interval_seconds: 300
      min_workspace_interval_seconds: 3600

    # Notifications
    notifications:
      enabled: true
      delivery_timeout_seconds: 30
      max_delivery_responses: 10
      smtp:
        host: ""
        port: 587
        username: ""
        # password: inject via TERRAPOD_NOTIFICATIONS__SMTP__PASSWORD env var
        from_address: "notifications@terrapod.local"
        use_tls: true

    # Rate limiting
    rate_limit:
      enabled: true
      requests_per_minute: 100
      auth_requests_per_minute: 10

    # Prometheus metrics
    metrics:
      enabled: true
      serviceMonitor:
        enabled: false
        interval: 30s
        labels: {}
      podMonitor:
        enabled: false
        interval: 30s
        labels: {}

    # Artifact Retention — periodic cleanup of old artifacts from object storage.
    # When enabled, a background task runs at the configured interval and removes
    # artifacts that exceed their retention thresholds.  Cache entries (provider
    # and binary) are cleaned based on last-access time, not creation time.
    artifact_retention:
      enabled: true
      poll_interval_seconds: 86400   # daily
      batch_size: 100
      state_versions_keep: 20       # per workspace; 0 = disabled
      run_artifacts_retention_days: 90
      config_versions_retention_days: 90
      provider_cache_retention_days: 30   # days since last access
      binary_cache_retention_days: 30     # days since last access
      module_overrides_retention_days: 14

    # CORS
    cors:
      allow_origins: []

  # Rolling update strategy — surge before killing to avoid downtime at any replica count.
  strategy:
    maxSurge: 1
    maxUnavailable: 0

  terminationGracePeriodSeconds: 120

  # Pod anti-affinity spreads replicas across nodes (required) and AZs (preferred).
  # Disable on single-node clusters. Set 'affinity' to override with custom rules.
  podAntiAffinity:
    enabled: true

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  priorityClassName: ""
  topologySpreadConstraints: []

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault

  # Extra labels added to pod metadata (e.g. for Istio, Linkerd, etc.)
  podLabels: {}

  # Extra environment variables, volumes, and mounts for the API container.
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  # Extra init and sidecar containers
  extraInitContainers: []
  extraContainers: []

  serviceAccount:
    create: true
    name: ""
    # Annotations for cloud provider workload identity:
    #
    # AWS IRSA:
    #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/terrapod-api
    #
    # Azure Workload Identity:
    #   azure.workload.identity/client-id: <managed-identity-client-id>
    #
    # GCP Workload Identity Federation:
    #   iam.gke.io/gcp-service-account: terrapod@project.iam.gserviceaccount.com
    annotations: {}

# ── Web UI (Next.js) ──────────────────────────────────────────────────────────
web:
  enabled: false

  replicas: 2

  image:
    repository: ghcr.io/mattrobinsonsre/terrapod-web
    tag: ""  # Defaults to appVersion
    pullPolicy: IfNotPresent

  # Service configuration
  service:
    type: ClusterIP
    annotations: {}

  # Probe overrides — template provides sensible defaults for all probe timings.
  # Set individual fields to override (e.g., startupProbe.failureThreshold: 20).
  startupProbe: {}
  livenessProbe: {}
  readinessProbe: {}

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  pdb:
    enabled: true
    maxUnavailable: 1

  # Rolling update strategy — surge before killing to avoid downtime at any replica count.
  strategy:
    maxSurge: 1
    maxUnavailable: 0

  terminationGracePeriodSeconds: 30

  # Pod anti-affinity spreads replicas across nodes (required) and AZs (preferred).
  # Disable on single-node clusters. Set 'affinity' to override with custom rules.
  podAntiAffinity:
    enabled: true

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  priorityClassName: ""
  topologySpreadConstraints: []

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault

  # Extra labels added to pod metadata (e.g. for Istio, Linkerd, etc.)
  podLabels: {}

  # Extra environment variables, volumes, and mounts for the web container.
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  # Extra init and sidecar containers
  extraInitContainers: []
  extraContainers: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}

# ── Runner Configuration ─────────────────────────────────────────────────────
runners:
  # Runner job container image (generic runner — binary fetched at runtime)
  image:
    repository: ghcr.io/mattrobinsonsre/terrapod-runner
    tag: ""  # defaults to appVersion
    pullPolicy: IfNotPresent

  # Internal API URL for runner Jobs. Runner pods use this to reach the API
  # for presigned storage URLs. Defaults to http://<release>-api:8000.
  serverUrl: ""

  # Image pull secrets for runner Jobs (private registries).
  # These are separate from global.imagePullSecrets which only cover
  # Helm-managed workloads. Runner Jobs are created dynamically by the
  # listener and need their own pull secrets.
  imagePullSecrets: []
  # Example:
  #   imagePullSecrets:
  #     - my-registry-secret

  # Extra environment variables injected into all runner Jobs.
  # Supports literal values and valueFrom (secretKeyRef, configMapKeyRef).
  extraEnv: []
  # Example:
  #   extraEnv:
  #     - name: AWS_DEFAULT_REGION
  #       value: eu-west-1
  #     - name: AWS_ACCESS_KEY_ID
  #       valueFrom:
  #         secretKeyRef:
  #           name: aws-credentials
  #           key: access-key-id

  # Inject all keys from Secrets or ConfigMaps as env vars on runner Jobs.
  extraEnvFrom: []
  # Example:
  #   extraEnvFrom:
  #     - secretRef:
  #         name: aws-credentials
  #     - configMapRef:
  #         name: runner-config

  # Shared Job settings
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  priorityClassName: ""
  topologySpreadConstraints: []
  podSecurityContext: {}
  ttlSecondsAfterFinished: 600  # Clean up completed Jobs after 10 min
  terminationGracePeriodSeconds: 120  # Time budget for graceful shutdown + artifact uploads
  tokenTTLSeconds: 3600         # Runner token TTL (default 1 hour)
  maxTokenTTLSeconds: 7200      # Runner token max TTL (default 2 hours)
  staleTimeoutSeconds: 3600     # Seconds before a run with no Job status is marked errored

  # ServiceAccount for runner Jobs (cloud workload identity)
  serviceAccount:
    # Set to false to use a pre-existing SA managed externally
    # (e.g. created by Terraform, eksctl, or az identity)
    create: true
    # SA name. Defaults to "<release>-runner" when create=true.
    # When create=false, must reference an existing SA in the runner namespace.
    name: ""
    # Annotations for cloud workload identity:
    #
    # AWS IRSA:
    #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/terrapod-runner
    #
    # Azure Workload Identity:
    #   azure.workload.identity/client-id: <managed-identity-client-id>
    #
    # GCP Workload Identity Federation:
    #   iam.gke.io/gcp-service-account: terrapod-runner@project.iam.gserviceaccount.com
    annotations: {}

  # Azure Workload Identity requires a pod label on runner Jobs.
  # Enable this when using Azure WI — harmless on non-Azure clusters.
  azureWorkloadIdentity: false

# ── Runner Listener ──────────────────────────────────────────────────────────
# Multiple replicas are supported. Each pod registers as an independent
# listener with a unique name derived from its pod hostname. All replicas
# in a pool compete for queued runs via atomic Postgres locking.
listener:
  enabled: true
  replicas: 1

  image:
    repository: ghcr.io/mattrobinsonsre/terrapod-listener
    tag: ""  # Defaults to appVersion
    pullPolicy: IfNotPresent
  # Base name for listener identity. Each pod appends its pod name,
  # so the registered name becomes "{name}-{pod-name}".
  name: "listener"
  # Port for /health and /ready HTTP probe endpoints
  healthPort: 8081

  # API URL for the listener to connect to. Leave empty when the API runs in
  # the same release (auto-detected as http://<release>-api:8000).
  # Set for agent-only deployments where the API is in a different cluster:
  #   apiUrl: "https://terrapod.example.com"
  # Also used as the default for runners.serverUrl when that value is empty.
  apiUrl: ""

  # Join token for pool registration.
  # Either set joinToken directly or reference an existing K8s Secret (recommended).
  # The token is obtained by creating an agent pool + join token via the API.
  joinToken: ""
  # existingSecret: "my-listener-credentials"
  # joinTokenKey: "join_token"  # key within the Secret (default: join_token)

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Namespace where runner Jobs are created (defaults to release namespace)
  runnerNamespace: ""

  # ServiceAccount for the listener Deployment
  serviceAccount:
    # Set to false to use a pre-existing SA
    create: true
    name: ""
    # Annotations for cloud workload identity (if listener needs
    # direct cloud access, e.g. for object storage):
    annotations: {}

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  pdb:
    enabled: true
    maxUnavailable: 1

  # Rolling update strategy — surge before killing to avoid downtime at any replica count.
  strategy:
    maxSurge: 1
    maxUnavailable: 0

  terminationGracePeriodSeconds: 120

  # Pod anti-affinity spreads replicas across nodes (required) and AZs (preferred).
  # Disable on single-node clusters. Set 'affinity' to override with custom rules.
  podAntiAffinity:
    enabled: true

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  priorityClassName: ""
  topologySpreadConstraints: []

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault

  # Extra labels added to pod metadata (e.g. for Istio, Linkerd, etc.)
  podLabels: {}

  # Extra environment variables, volumes, and mounts for the listener container.
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  # Extra init and sidecar containers
  extraInitContainers: []
  extraContainers: []

# ── Ingress ───────────────────────────────────────────────────────────────────
# BFF pattern: all traffic enters through the web frontend (Next.js).
# Next.js rewrites proxy /api/* and /.well-known/* to the API service
# internally via the API_URL env var on the web deployment.
# NOTE: Requires web.enabled=true — the Ingress routes to the web frontend.
ingress:
  enabled: false
  className: ""
  hostname: ""  # Required: e.g., terrapod.example.com
  tls: true
  pathType: Prefix
  annotations: {}
  # Extra paths prepended before the default catch-all path.
  # Useful for custom backends (e.g. SSL redirect, health check ALB target).
  extraPaths: []
  # - path: /healthz
  #   pathType: Exact
  #   backend:
  #     service:
  #       name: my-health-service
  #       port:
  #         name: http

# ── TLS ───────────────────────────────────────────────────────────────────────
tls:
  # Name of an existing TLS Secret. If empty, uses <fullname>-tls.
  existingSecret: ""

# ── Migrations ────────────────────────────────────────────────────────────────
migrations:
  enabled: true

  image:
    repository: ghcr.io/mattrobinsonsre/terrapod-migrations
    tag: ""  # Defaults to appVersion
    pullPolicy: IfNotPresent

# ── Bootstrap (initial admin user + optional pool) ─────────────────────────
# bootstrap:
#   adminEmail: admin@example.com
#   adminPassword: ""  # Required when enabled
#   existingSecret: ""  # Alternative: reference an existing K8s Secret
#   emailKey: email
#   passwordKey: password
#   poolName: ""       # Optional: auto-create an agent pool with this name
#   poolToken: ""      # Optional: auto-create a join token for the pool

# ── Database (PostgreSQL) ─────────────────────────────────────────────────────
# Provide credentials via existingSecret (recommended) or url (dev only).
postgresql:
  url: ""
  # existingSecret: "terrapod-db-credentials"
  # existingSecretKey: "url"  # key within the Secret (default: url)

# ── Redis ─────────────────────────────────────────────────────────────────
# Provide credentials via existingSecret (recommended) or url (dev only).
redis:
  url: ""
  # existingSecret: "terrapod-redis-credentials"
  # existingSecretKey: "url"  # key within the Secret (default: url)

# ── Storage ─────────────────────────────────────────────────────────────────
# Filesystem PVC — only created when storage.backend=filesystem
storage:
  filesystem:
    persistence:
      enabled: true
      size: 50Gi
      storageClass: ""
      accessModes:
        - ReadWriteOnce

# ── Network Policies ────────────────────────────────────────────────────────
# Restrict pod-to-pod and pod-to-external traffic.
# Requires a CNI plugin that supports NetworkPolicy (Calico, Cilium, etc.).
networkPolicies:
  enabled: false

# ── Namespace ───────────────────────────────────────────────────────────────
# Optionally create the namespace with Pod Security Standards labels.
# Example labels for PSS restricted profile:
#   pod-security.kubernetes.io/enforce: restricted
#   pod-security.kubernetes.io/audit: restricted
#   pod-security.kubernetes.io/warn: restricted
namespace:
  create: false
  labels: {}
