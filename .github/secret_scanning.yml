# GitHub Secret Scanning configuration
# https://docs.github.com/en/code-security/secret-scanning
#
# Secret scanning is enabled at the repository level in GitHub Settings.
# This file configures push protection: blocking pushes that contain secrets.
#
# Paths listed here are excluded from push protection checks
# (the secrets are still detected and reported, but won't block pushes).
paths-ignore:
  # Test fixtures may contain fake/example secrets
  - "services/tests/**"
  # Pen test rules reference secret patterns
  - "pentest/**"
  # Alembic migration revision hashes
  - "alembic/versions/**"
