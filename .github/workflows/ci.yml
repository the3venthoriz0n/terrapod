name: CI

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  pull_request:
    branches: [main]
    # Include `ready_for_review` so a PR opened in draft (which suppresses
    # the default `opened`/`synchronize` events) starts CI when it's
    # marked ready. Without this, draft-first PRs need a close+reopen to
    # get any CI run at all — caught while bringing up #371.
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/mattrobinsonsre

jobs:
  # ── Prepare ────────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
      images_exist: ${{ steps.check.outputs.images_exist }}
      is_tag: ${{ steps.meta.outputs.is_tag }}
      is_pr: ${{ steps.meta.outputs.is_pr }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute metadata
        id: meta
        run: |
          sha_short="${GITHUB_SHA::7}"
          echo "sha_short=$sha_short" >> "$GITHUB_OUTPUT"

          is_tag=false
          is_pr=false
          version=""

          if [[ "$GITHUB_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            is_tag=true
            version="${GITHUB_REF#refs/tags/}"
          fi

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            is_pr=true
          fi

          echo "is_tag=$is_tag" >> "$GITHUB_OUTPUT"
          echo "is_pr=$is_pr" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: ./.github/actions/ghcr-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.actor }}

      - name: Check if images exist
        id: check
        run: |
          sha_short="${GITHUB_SHA::7}"
          images_exist=true

          for image in terrapod-api terrapod-web terrapod-runner terrapod-listener terrapod-migrations; do
            if ! docker manifest inspect "$REGISTRY/$image:sha-$sha_short" > /dev/null 2>&1; then
              echo "$image:sha-$sha_short not found"
              images_exist=false
              break
            fi
          done

          echo "images_exist=$images_exist" >> "$GITHUB_OUTPUT"
          echo "Images exist: $images_exist"

  # ── Python Lint ────────────────────────────────────────
  python-lint:
    name: Python Lint
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: scripts/lint.sh python

  # ── Frontend Lint ─────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    container: node:24-alpine
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript type-check
        run: npm run type-check

  # ── Provider Lint ─────────────────────────────────────
  provider-lint:
    name: Provider Lint
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: provider/go.mod
          cache-dependency-path: provider/go.sum
      - name: Vet
        run: go vet ./...
        working-directory: provider
      - name: Build
        run: go build ./...
        working-directory: provider

  # ── Provider Test ────────────────────────────────────
  provider-test:
    name: Provider Test
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: provider/go.mod
          cache-dependency-path: provider/go.sum
      - name: Test
        run: go test ./... -v -count=1 -timeout 120s
        working-directory: provider

  # ── go-terrapod Lint ──────────────────────────────────
  # The public Go SDK lives in go-terrapod/ with its own go.mod (no
  # provider/migrate-specific deps). Both terraform-provider-terrapod
  # and terrapod-migrate import from here.
  go-terrapod-lint:
    name: go-terrapod Lint
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go-terrapod/go.mod
          cache-dependency-path: go-terrapod/go.sum
      - name: Vet
        run: go vet ./...
        working-directory: go-terrapod
      - name: Build
        run: go build ./...
        working-directory: go-terrapod

  # ── go-terrapod Test ──────────────────────────────────
  go-terrapod-test:
    name: go-terrapod Test
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go-terrapod/go.mod
          cache-dependency-path: go-terrapod/go.sum
      - name: Test
        run: go test ./... -v -count=1 -timeout 120s
        working-directory: go-terrapod

  # ── Migrate Lint ──────────────────────────────────────
  # The terrapod-migrate binary lives in migrate/ with its own go.mod
  # (the provider doesn't carry go-tfe or the HCL libs). Mirrors the
  # provider-lint shape so failures look the same to operators.
  migrate-lint:
    name: Migrate Lint
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: migrate/go.mod
          cache-dependency-path: migrate/go.sum
      - name: Vet
        run: go vet ./...
        working-directory: migrate
      - name: Build
        run: go build ./...
        working-directory: migrate

  # ── Migrate Test ──────────────────────────────────────
  migrate-test:
    name: Migrate Test
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: migrate/go.mod
          cache-dependency-path: migrate/go.sum
      - name: Test
        run: go test ./... -v -count=1 -timeout 120s
        working-directory: migrate

  # ── Python Test ────────────────────────────────────────
  python-test:
    # Sharded by directory so each shard gets its own Postgres /
    # Redis / LocalStack stack via docker-compose.test.yml. Integration
    # tests hit a real DB and are race-prone under pytest-xdist within
    # one job; runner-level shards avoid that.
    #
    # Slice 1 — fast unit-ish (mock-based; no DB)
    # Slice 2 — services + api (mock-based; the bulk)
    # Slice 3 — integration (real Postgres; the slowest 12s tests live here)
    #
    # On a v0.35.0 main-run reference: combined 310s serial →
    # split slowest-shard ~75s (integration), others sub-60s.
    name: Python Test (${{ matrix.slice.name }})
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slice:
          # pytest-xdist `-n auto` is enabled for the two mock-heavy
          # shards. Local bench (Apple M-series; CI ~50-60% of this):
          #   unit         90s serial → 13s parallel (1495 → 492 tests)
          #   services-api 138s serial → 30s parallel
          # The integration shard stays serial — its
          # session-scoped Postgres table-creation fixture races
          # under xdist workers (each worker would try to create
          # the same tables) and the suite is small enough that
          # serial is fine.
          - name: unit
            paths: tests/auth tests/runner tests/storage tests/test_logging_config.py
            pytest_args: -n auto
          - name: services-api
            paths: tests/services tests/api
            pytest_args: -n auto
          - name: integration
            paths: tests/integration
            pytest_args: ""
    steps:
      - uses: actions/checkout@v6
      - run: scripts/test.sh python -- ${{ matrix.slice.pytest_args }} ${{ matrix.slice.paths }}

  # ── Dependency Audit (Python) ─────────────────────────
  python-audit:
    name: Python Audit
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    container: python:3.13-slim
    steps:
      - uses: actions/checkout@v6
      - name: Install Poetry and export plugin
        run: pip install poetry poetry-plugin-export
      - name: Export requirements
        run: poetry export -f requirements.txt -o requirements.txt --without-hashes
        working-directory: services
      - name: Run pip-audit
        # PYSEC-2025-183 (pyjwt): disputed by the supplier — the advisory
        # concerns weak HMAC keys, but key length is controlled by the
        # application that uses the library, not by the library. No fix
        # version is published. Suppress until a fix lands or the dispute
        # is resolved upstream.
        run: |
          pip install pip-audit
          pip-audit -r services/requirements.txt --strict --desc \
            --ignore-vuln PYSEC-2025-183

  # ── Dependency Audit (npm) ────────────────────────────
  npm-audit:
    name: npm Audit
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    container: node:24-alpine
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=high

  # ── Secret Scanning (gitleaks) ────────────────────────
  secret-scan:
    name: Secret Scan
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    container: zricethezav/gitleaks:latest
    steps:
      - uses: actions/checkout@v6
      - name: Run gitleaks
        run: gitleaks detect --source . --no-git --config .gitleaks.toml

  # ── CodeQL (GitHub Advanced Security) ──────────────────
  codeql:
    name: CodeQL (${{ matrix.language }})
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality
          config-file: .github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-${{ matrix.language }}

  # ── Dependency Review (PR only) ───────────────────────
  # Requires "Dependency graph" enabled in repo Settings > Code security
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # ── Helm Lint ──────────────────────────────────────────
  helm-lint:
    name: Helm Lint
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Helm lint (default values)
        run: |
          docker run --rm -v "$PWD:/chart" -w /chart \
            alpine/helm:3.17.2 \
            lint helm/terrapod --values helm/terrapod/values.yaml
      - name: Helm lint (local dev values)
        run: |
          docker run --rm -v "$PWD:/chart" -w /chart \
            alpine/helm:3.17.2 \
            lint helm/terrapod --values helm/terrapod/values.yaml --values helm/terrapod/values-local.yaml

  # ── SAST (Semgrep) ─────────────────────────────────────
  sast:
    name: SAST
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Run Semgrep
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            semgrep/semgrep:1.117 \
            semgrep scan /src \
              --config "p/python" \
              --config "p/owasp-top-ten" \
              --config "p/secrets" \
              --config "/src/pentest/semgrep/.semgrep.yml" \
              --exclude "web/node_modules" \
              --exclude ".next" \
              --exclude "dist" \
              --exclude "alembic/versions" \
              --exclude "reports" \
              --exclude-rule "python.lang.security.insecure-hash-algorithms-md5.insecure-hash-algorithm-md5" \
              --exclude-rule "python.lang.security.audit.logging.logger-credential-leak.python-logger-credential-disclosure" \
              --sarif \
              --output "/src/semgrep-results.sarif"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  # ── Build Images ───────────────────────────────────────
  build-images:
    name: Build ${{ matrix.image }} (${{ matrix.arch }})
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, arm64]
        image: [terrapod-api, terrapod-web, terrapod-runner, terrapod-listener, terrapod-migrations]
        include:
          - image: terrapod-api
            dockerfile: docker/Dockerfile.api
          - image: terrapod-web
            dockerfile: docker/Dockerfile.web
          - image: terrapod-runner
            dockerfile: docker/Dockerfile.runner
          - image: terrapod-listener
            dockerfile: docker/Dockerfile.listener
          - image: terrapod-migrations
            dockerfile: docker/Dockerfile.migrations
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: ./.github/actions/ghcr-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.actor }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          # On PRs we do NOT push to GHCR. Fork PRs get a read-only
          # GITHUB_TOKEN (no package:write), so a push fails outright — and
          # even same-repo PRs gain nothing from a registry round-trip. The
          # built image is loaded into the local Docker daemon and handed to
          # the scan/e2e jobs as a workflow artifact instead. Pushes happen
          # only on branch/tag builds, which run from the main repo and have
          # the write token. `is_pr` (not fork-status) is the discriminator,
          # so fork and same-repo PRs take the identical artifact path.
          push: ${{ needs.prepare.outputs.is_pr != 'true' }}
          load: ${{ needs.prepare.outputs.is_pr == 'true' && matrix.arch == 'amd64' }}
          tags: ${{ env.REGISTRY }}/${{ matrix.image }}:sha-${{ needs.prepare.outputs.sha_short }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

      # PR builds: persist the loaded image as an artifact for scan/e2e.
      # amd64 only — that's the arch those jobs consume; the arm64 PR build
      # is a "does it still build on arm" check and needs no artifact.
      - name: Export image artifact
        if: needs.prepare.outputs.is_pr == 'true' && matrix.arch == 'amd64'
        run: |
          docker save "$REGISTRY/${{ matrix.image }}:sha-${{ needs.prepare.outputs.sha_short }}-amd64" \
            | gzip > "/tmp/${{ matrix.image }}-amd64.tar.gz"

      - name: Upload image artifact
        if: needs.prepare.outputs.is_pr == 'true' && matrix.arch == 'amd64'
        uses: actions/upload-artifact@v7
        with:
          name: image-${{ matrix.image }}-amd64
          path: /tmp/${{ matrix.image }}-amd64.tar.gz
          retention-days: 1

  # ── E2E Tests (Playwright) ─────────────────────────────
  e2e-test:
    # Sharded across 2 GitHub runners using Playwright's built-in
    # --shard=k/N. Each shard boots its own docker-compose stack
    # (~30s overhead) so they're independent. We initially tried 4
    # shards but the per-shard boot cost dominated — 4 shards × 30s
    # in parallel wasted 90s vs 60s for 2 shards. As the suite grows
    # past the current 13 spec files, revisit shard count.
    name: E2E Tests (${{ matrix.shard }}/${{ strategy.job-total }})
    needs: [prepare, build-images]
    if: |
      always()
      && needs.build-images.result == 'success'
      && needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    # Whole-job upper bound. Default is GitHub's 360 min, which lets a
    # wedged step run for six hours before anyone notices. 15 min covers
    # a cold-runner worst-case (image pull + stack boot + test suite)
    # with headroom; anything past that is genuinely broken, not slow.
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      # Branch/tag builds pull the images from GHCR; PR builds load them
      # from the build-images artifacts (no registry push on PRs). Either
      # way the stack runs off the `<image>:local` tags.
      - name: Log in to GHCR
        if: needs.prepare.outputs.is_pr != 'true'
        uses: ./.github/actions/ghcr-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.actor }}

      - name: Pull images (branch/tag)
        if: needs.prepare.outputs.is_pr != 'true'
        run: |
          sha_short="${{ needs.prepare.outputs.sha_short }}"
          for image in terrapod-api terrapod-web terrapod-migrations; do
            docker pull "$REGISTRY/$image:sha-${sha_short}-amd64"
            docker tag "$REGISTRY/$image:sha-${sha_short}-amd64" "$image:local"
          done

      - name: Download image artifacts (PR)
        if: needs.prepare.outputs.is_pr == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: image-*-amd64
          path: /tmp/images
          merge-multiple: true

      - name: Load images (PR)
        if: needs.prepare.outputs.is_pr == 'true'
        run: |
          sha_short="${{ needs.prepare.outputs.sha_short }}"
          for image in terrapod-api terrapod-web terrapod-migrations; do
            gunzip -c "/tmp/images/$image-amd64.tar.gz" | docker load
            docker tag "$REGISTRY/$image:sha-${sha_short}-amd64" "$image:local"
          done

      - name: Start E2E stack
        run: docker compose -f e2e/docker-compose.e2e.yml up -d

      - name: Wait for stack health
        run: |
          timeout=120
          elapsed=0
          while ! curl -sf http://localhost:3000/ > /dev/null 2>&1; do
            if (( elapsed >= timeout )); then
              echo "Stack not healthy after ${timeout}s"
              docker compose -f e2e/docker-compose.e2e.yml logs
              exit 1
            fi
            sleep 2
            elapsed=$((elapsed + 2))
          done
          echo "Stack healthy (${elapsed}s)"

      # Run npm ci + tests inside the official Playwright image. The
      # image bundles Node + Chromium + all OS deps, eliminating the
      # `playwright install` step that has repeatedly wedged at the
      # extract phase on the Azure-backed runner disk (167 MiB → ~600
      # MiB unpack across many small files takes >5 min consistently).
      #
      # `--network host` lets the container reach the docker-compose
      # stack on localhost. `--ipc=host` is the Playwright-recommended
      # setting to avoid Chromium running out of memory in shared /dev/shm.
      # Image tag MUST track the pinned `@playwright/test` version in
      # e2e/package-lock.json — version skew between client and bundled
      # browsers causes runtime failures.
      - name: Run Playwright tests
        run: |
          docker run --rm \
            --network=host \
            --ipc=host \
            -v "${{ github.workspace }}/e2e:/work" \
            -w /work \
            -e CI=true \
            -e HOME=/tmp \
            mcr.microsoft.com/playwright:v1.58.2-noble \
            sh -c "npm ci --ignore-scripts && npx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }}"
        # Playwright has per-test timeouts of its own; this is the
        # outer safety net. npm ci inside the container is ~10 s for
        # this tree (only @playwright/test + typescript).
        timeout-minutes: 10

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: e2e/playwright-report/
          retention-days: 14

      - name: Tear down
        if: always()
        run: docker compose -f e2e/docker-compose.e2e.yml down -v

  # ── Scan Images (Trivy) ────────────────────────────────
  scan-images:
    name: Scan ${{ matrix.image }}
    needs: [prepare, build-images]
    if: |
      always()
      && needs.build-images.result == 'success'
      && needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image: [terrapod-api, terrapod-web, terrapod-runner, terrapod-listener, terrapod-migrations]
    steps:
      - uses: actions/checkout@v6

      # On branch/tag builds the image lives in GHCR — log in and let Trivy
      # pull it. On PRs nothing was pushed; the image arrives as an artifact
      # from build-images and is loaded into the local daemon below, where
      # Trivy finds it by the same tag without any registry access.
      - name: Log in to GHCR
        if: needs.prepare.outputs.is_pr != 'true'
        uses: ./.github/actions/ghcr-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.actor }}

      - name: Download image artifact (PR)
        if: needs.prepare.outputs.is_pr == 'true'
        uses: actions/download-artifact@v8
        with:
          name: image-${{ matrix.image }}-amd64
          path: /tmp

      - name: Load image (PR)
        if: needs.prepare.outputs.is_pr == 'true'
        run: gunzip -c "/tmp/${{ matrix.image }}-amd64.tar.gz" | docker load

      # Human-readable findings step. Always prints the table of CVEs
      # Trivy would gate on to the action log — so a failure in the
      # gating step below can be diagnosed without downloading SARIF or
      # re-running Trivy locally. exit-code: '0' keeps this informational.
      - name: Trivy findings (table, informational)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/mattrobinsonsre/${{ matrix.image }}:sha-${{ needs.prepare.outputs.sha_short }}-amd64
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: pentest/trivy/.trivyignore
          exit-code: '0'

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/mattrobinsonsre/${{ matrix.image }}:sha-${{ needs.prepare.outputs.sha_short }}-amd64
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: pentest/trivy/.trivyignore
          exit-code: '1'
          limit-severities-for-sarif: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

  # ── Create Multi-Arch Manifests ────────────────────────
  create-manifests:
    name: Manifest ${{ matrix.image }}
    needs: [prepare, build-images, python-lint, frontend-lint, python-test, python-audit, npm-audit, secret-scan, codeql, helm-lint, sast, scan-images]
    if: |
      always()
      && needs.build-images.result == 'success'
      && needs.prepare.outputs.is_pr != 'true'
      && (needs.python-lint.result == 'success' || needs.python-lint.result == 'skipped')
      && (needs.frontend-lint.result == 'success' || needs.frontend-lint.result == 'skipped')
      && (needs.python-test.result == 'success' || needs.python-test.result == 'skipped')
      && (needs.python-audit.result == 'success' || needs.python-audit.result == 'skipped')
      && (needs.npm-audit.result == 'success' || needs.npm-audit.result == 'skipped')
      && (needs.secret-scan.result == 'success' || needs.secret-scan.result == 'skipped')
      && (needs.codeql.result == 'success' || needs.codeql.result == 'skipped')
      && (needs.helm-lint.result == 'success' || needs.helm-lint.result == 'skipped')
      && (needs.sast.result == 'success' || needs.sast.result == 'skipped')
      && (needs.scan-images.result == 'success' || needs.scan-images.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [terrapod-api, terrapod-web, terrapod-runner, terrapod-listener, terrapod-migrations]
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: ./.github/actions/ghcr-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.actor }}

      - name: Create multi-arch manifest
        run: |
          sha_short="${{ needs.prepare.outputs.sha_short }}"
          echo "Creating manifest for ${{ matrix.image }}:sha-$sha_short"
          docker buildx imagetools create -t "$REGISTRY/${{ matrix.image }}:sha-$sha_short" \
            "$REGISTRY/${{ matrix.image }}:sha-${sha_short}-amd64" \
            "$REGISTRY/${{ matrix.image }}:sha-${sha_short}-arm64"

  # ── Release ────────────────────────────────────────────
  # The release stage is five jobs — a tiny pre-create that owns the
  # Release object and four branches that all upload into it in
  # parallel:
  #
  #   release-create   — pre-creates an empty GitHub Release for the tag
  #                      with a placeholder title. Owning Release
  #                      creation here means provider AND migrate can
  #                      both run in append mode at the same time
  #                      instead of provider gating migrate (#435 had
  #                      provider create the Release → migrate append).
  #   release-images   — image retag + Helm push + SBOM generation.
  #                      Saves chart + SBOMs + checksums as a workflow
  #                      artifact for release-finalize to upload.
  #   release-provider — GoReleaser provider, append mode.
  #   release-migrate  — GoReleaser migrate, append mode.
  #   release-finalize — joins all four; sets real title + release notes
  #                      and uploads the workflow artifact from
  #                      release-images.
  #
  # Both goreleaser invocations also pass `--parallelism 6` so each
  # process saturates the runner's cores when crunching its own
  # platform matrix.

  release-create:
    name: Release — Create empty GitHub Release
    needs: [prepare, create-manifests]
    if: |
      always()
      && needs.prepare.outputs.is_tag == 'true'
      && needs.prepare.result == 'success'
      && (needs.create-manifests.result == 'success' || needs.create-manifests.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create empty Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.prepare.outputs.version }}"

          # Idempotent: if the Release already exists (e.g. this job
          # is being re-run), skip. release-finalize will set the
          # real title/notes; we just need the Release object so the
          # append-mode goreleaser runs have somewhere to upload to.
          if gh release view "$version" >/dev/null 2>&1; then
            echo "Release $version already exists; skipping create"
            exit 0
          fi
          gh release create "$version" \
            --title "$version (in progress)" \
            --notes "Release in progress — assets are being attached by parallel CI jobs."

  release-images:
    name: Release — Images, Helm, SBOMs
    needs: [prepare, create-manifests]
    if: |
      always()
      && needs.prepare.outputs.is_tag == 'true'
      && needs.prepare.result == 'success'
      && (needs.create-manifests.result == 'success' || needs.create-manifests.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Log in to GHCR (docker + helm)
        uses: ./.github/actions/ghcr-login
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.actor }}
          helm: 'true'

      - name: Retag images with version
        run: |
          sha_short="${{ needs.prepare.outputs.sha_short }}"
          version="${{ needs.prepare.outputs.version }}"

          # GHCR occasionally returns 5xx on manifest reads/writes during
          # a retag — wrap with the shared 5/10/20/40s backoff helper.
          for image in terrapod-api terrapod-web terrapod-runner terrapod-listener terrapod-migrations; do
            echo "Retagging $image:sha-$sha_short -> $version + latest"
            .github/scripts/with-retry.sh "imagetools create $image" -- \
              docker buildx imagetools create \
                -t "$REGISTRY/$image:$version" \
                -t "$REGISTRY/$image:latest" \
                "$REGISTRY/$image:sha-$sha_short"
          done

      - name: Publish Helm chart
        run: |
          version="${{ needs.prepare.outputs.version }}"
          chart_version="${version#v}"

          helm package helm/terrapod --destination dist/ \
            --version "$chart_version" --app-version "$version"

          .github/scripts/with-retry.sh "helm push" -- \
            helm push "dist/terrapod-${chart_version}.tgz" "oci://$REGISTRY"

      - name: Generate SBOMs
        run: |
          version="${{ needs.prepare.outputs.version }}"

          # Install syft
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

          for image in terrapod-api terrapod-web terrapod-runner terrapod-listener terrapod-migrations; do
            echo "Generating SBOM for $image:$version"
            syft "$REGISTRY/$image:$version" -o spdx-json="dist/sbom-${image}.spdx.json"
          done

      - name: Generate checksums
        run: |
          (cd dist && sha256sum -- *.tgz *.spdx.json > checksums.txt)

      - name: Upload artifact for release-finalize
        uses: actions/upload-artifact@v7
        with:
          name: release-images-assets
          path: dist/
          retention-days: 1

  release-provider:
    name: Release — Provider (GoReleaser)
    # Both goreleaser jobs depend only on release-create — they no
    # longer gate on each other. provider/.goreleaser.yml is
    # release.mode=append.
    needs: [prepare, release-create]
    if: |
      always()
      && needs.prepare.outputs.is_tag == 'true'
      && needs.release-create.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: provider/go.mod
          cache-dependency-path: provider/go.sum

      - name: Import GPG signing key
        id: gpg
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          fingerprint=$(gpg --with-colons --import-options show-only --import <<< "${{ secrets.GPG_PRIVATE_KEY }}" | awk -F: '/^fpr:/{print $10; exit}')
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"

      - name: Build provider binaries with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          # --parallelism saturates the runner's 4 vCPUs across the
          # 8-platform build matrix (slightly oversubscribed because
          # part of each build is I/O — module download, GPG signing).
          args: release --clean --parallelism 6
          workdir: provider
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.gpg.outputs.fingerprint }}

  release-migrate:
    name: Release — Migrate tool (GoReleaser)
    # Parallel with release-provider — both append to the Release that
    # release-create made.
    needs: [prepare, release-create]
    if: |
      always()
      && needs.prepare.outputs.is_tag == 'true'
      && needs.release-create.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: migrate/go.mod
          cache-dependency-path: migrate/go.sum

      - name: Import GPG signing key
        id: gpg
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          fingerprint=$(gpg --with-colons --import-options show-only --import <<< "${{ secrets.GPG_PRIVATE_KEY }}" | awk -F: '/^fpr:/{print $10; exit}')
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"

      # Linux/Windows ship as per-arch zips; macOS ships as a single
      # Universal 2 binary built by lipo-merging darwin/amd64 +
      # darwin/arm64. See migrate/.goreleaser.yml.
      - name: Build migrate-tool binaries with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          # See note on release-provider — same parallelism rationale.
          args: release --clean --parallelism 6
          workdir: migrate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.gpg.outputs.fingerprint }}

  release-finalize:
    name: Release — Finalize (notes + chart + SBOMs)
    needs: [prepare, release-create, release-images, release-provider, release-migrate]
    if: |
      always()
      && needs.prepare.outputs.is_tag == 'true'
      && needs.release-create.result == 'success'
      && needs.release-images.result == 'success'
      && needs.release-provider.result == 'success'
      && needs.release-migrate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release-images artifact
        uses: actions/download-artifact@v4
        with:
          name: release-images-assets
          path: dist/

      - name: Generate release notes
        run: |
          version="${{ needs.prepare.outputs.version }}"

          prev_tag=$(git describe --tags --abbrev=0 "${version}^" 2>/dev/null || echo "")

          if [[ -n "$prev_tag" ]]; then
            range="${prev_tag}..${version}"
          else
            range="$version"
          fi

          feats="" fixes="" docs="" refactors="" tests="" chores="" others=""

          while IFS= read -r line; do
            msg=$(echo "$line" | sed -E 's/^[a-z]+(\([^)]*\))?[!]?:[[:space:]]*//')

            case "$line" in
              feat:*|feat\(*)     feats+="- ${msg}"$'\n' ;;
              fix:*|fix\(*)       fixes+="- ${msg}"$'\n' ;;
              docs:*|docs\(*)     docs+="- ${msg}"$'\n' ;;
              refactor:*|refactor\(*) refactors+="- ${msg}"$'\n' ;;
              test:*|test\(*)     tests+="- ${msg}"$'\n' ;;
              chore:*|chore\(*|ci:*|ci\(*) chores+="- ${msg}"$'\n' ;;
              *)                  others+="- ${line}"$'\n' ;;
            esac
          done < <(git log --format='%s' "$range" 2>/dev/null)

          notes=""
          [[ -n "$feats" ]] && notes+="### Features"$'\n\n'"$feats"$'\n'
          [[ -n "$fixes" ]] && notes+="### Bug Fixes"$'\n\n'"$fixes"$'\n'
          [[ -n "$docs" ]] && notes+="### Documentation"$'\n\n'"$docs"$'\n'
          [[ -n "$refactors" ]] && notes+="### Refactoring"$'\n\n'"$refactors"$'\n'
          [[ -n "$tests" ]] && notes+="### Tests"$'\n\n'"$tests"$'\n'
          [[ -n "$chores" ]] && notes+="### Maintenance"$'\n\n'"$chores"$'\n'
          [[ -n "$others" ]] && notes+="### Other Changes"$'\n\n'"$others"$'\n'

          if [[ -n "$prev_tag" ]]; then
            notes+="**Full Changelog**: https://github.com/mattrobinsonsre/terrapod/compare/${prev_tag}...${version}"$'\n'
          fi

          # Write to file to preserve newlines
          echo "$notes" > /tmp/release-notes.md

      - name: Edit Release title/notes + upload chart, SBOMs, checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.prepare.outputs.version }}"
          chart_version="${version#v}"

          # GoReleaser already created the release with provider binaries.
          # Update title/notes and upload remaining assets.
          gh release edit "$version" \
            --title "$version" \
            --notes-file /tmp/release-notes.md

          gh release upload "$version" \
            dist/terrapod-${chart_version}.tgz \
            dist/sbom-terrapod-api.spdx.json \
            dist/sbom-terrapod-web.spdx.json \
            dist/sbom-terrapod-runner.spdx.json \
            dist/sbom-terrapod-listener.spdx.json \
            dist/sbom-terrapod-migrations.spdx.json \
            dist/checksums.txt \
            --clobber

  # ── Cleanup Tag on Failure ─────────────────────────────
  cleanup-tag:
    name: Cleanup Tag
    needs: [prepare, build-images, scan-images, create-manifests, release-create, release-images, release-provider, release-migrate, release-finalize]
    if: |
      always()
      && needs.prepare.outputs.is_tag == 'true'
      && (needs.build-images.result == 'failure' || needs.scan-images.result == 'failure' || needs.create-manifests.result == 'failure' || needs.release-create.result == 'failure' || needs.release-images.result == 'failure' || needs.release-provider.result == 'failure' || needs.release-migrate.result == 'failure' || needs.release-finalize.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Delete tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.prepare.outputs.version }}"
          echo "Cleaning up failed release $version"

          gh release delete "$version" --cleanup-tag --yes 2>/dev/null || true
          git push origin ":refs/tags/$version" 2>/dev/null || true

  # ── Gate ───────────────────────────────────────────────
  ci-pass:
    name: CI
    if: always()
    needs:
      - prepare
      - python-lint
      - frontend-lint
      - provider-lint
      - provider-test
      - go-terrapod-lint
      - go-terrapod-test
      - migrate-lint
      - migrate-test
      - python-test
      - python-audit
      - npm-audit
      - secret-scan
      - codeql
      - dependency-review
      - helm-lint
      - sast
      - build-images
      - scan-images
      - e2e-test
      - create-manifests
      - release-create
      - release-images
      - release-provider
      - release-migrate
      - release-finalize
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=(
            "${{ needs.prepare.result }}"
            "${{ needs.python-lint.result }}"
            "${{ needs.frontend-lint.result }}"
            "${{ needs.provider-lint.result }}"
            "${{ needs.provider-test.result }}"
            "${{ needs.go-terrapod-lint.result }}"
            "${{ needs.go-terrapod-test.result }}"
            "${{ needs.migrate-lint.result }}"
            "${{ needs.migrate-test.result }}"
            "${{ needs.python-test.result }}"
            "${{ needs.python-audit.result }}"
            "${{ needs.npm-audit.result }}"
            "${{ needs.secret-scan.result }}"
            "${{ needs.codeql.result }}"
            "${{ needs.dependency-review.result }}"
            "${{ needs.helm-lint.result }}"
            "${{ needs.sast.result }}"
            "${{ needs.build-images.result }}"
            "${{ needs.scan-images.result }}"
            "${{ needs.e2e-test.result }}"
            "${{ needs.create-manifests.result }}"
            "${{ needs.release-create.result }}"
            "${{ needs.release-images.result }}"
            "${{ needs.release-provider.result }}"
            "${{ needs.release-migrate.result }}"
            "${{ needs.release-finalize.result }}"
          )

          for r in "${results[@]}"; do
            if [[ "$r" == "failure" ]]; then
              echo "One or more jobs failed"
              exit 1
            fi
          done
          echo "All checks passed"
