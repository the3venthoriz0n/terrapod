name: CI

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/mattrobinsonsre

jobs:
  # ── Prepare ────────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
      images_exist: ${{ steps.check.outputs.images_exist }}
      is_tag: ${{ steps.meta.outputs.is_tag }}
      is_pr: ${{ steps.meta.outputs.is_pr }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute metadata
        id: meta
        run: |
          sha_short="${GITHUB_SHA::7}"
          echo "sha_short=$sha_short" >> "$GITHUB_OUTPUT"

          is_tag=false
          is_pr=false
          version=""

          if [[ "$GITHUB_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            is_tag=true
            version="${GITHUB_REF#refs/tags/}"
          fi

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            is_pr=true
          fi

          echo "is_tag=$is_tag" >> "$GITHUB_OUTPUT"
          echo "is_pr=$is_pr" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if images exist
        id: check
        run: |
          sha_short="${GITHUB_SHA::7}"
          images_exist=true

          for image in terrapod-api terrapod-web terrapod-runner terrapod-listener terrapod-migrations; do
            if ! docker manifest inspect "$REGISTRY/$image:sha-$sha_short" > /dev/null 2>&1; then
              echo "$image:sha-$sha_short not found"
              images_exist=false
              break
            fi
          done

          echo "images_exist=$images_exist" >> "$GITHUB_OUTPUT"
          echo "Images exist: $images_exist"

  # ── Python Lint ────────────────────────────────────────
  python-lint:
    name: Python Lint
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: scripts/lint.sh python

  # ── Frontend Lint ─────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    container: node:24-alpine
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript type-check
        run: npm run type-check

  # ── Provider Lint ─────────────────────────────────────
  provider-lint:
    name: Provider Lint
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: provider/go.mod
          cache-dependency-path: provider/go.sum
      - name: Vet
        run: go vet ./...
        working-directory: provider
      - name: Build
        run: go build ./...
        working-directory: provider

  # ── Provider Test ────────────────────────────────────
  provider-test:
    name: Provider Test
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: provider/go.mod
          cache-dependency-path: provider/go.sum
      - name: Test
        run: go test ./... -v -count=1 -timeout 120s
        working-directory: provider

  # ── Python Test ────────────────────────────────────────
  python-test:
    name: Python Test
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: scripts/test.sh python

  # ── Dependency Audit (Python) ─────────────────────────
  python-audit:
    name: Python Audit
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    container: python:3.14-slim
    steps:
      - uses: actions/checkout@v6
      - name: Install Poetry and export plugin
        run: pip install poetry poetry-plugin-export
      - name: Export requirements
        run: poetry export -f requirements.txt -o requirements.txt --without-hashes
        working-directory: services
      - name: Run pip-audit
        run: pip install pip-audit && pip-audit -r services/requirements.txt --strict --desc

  # ── Dependency Audit (npm) ────────────────────────────
  npm-audit:
    name: npm Audit
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    container: node:24-alpine
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=high

  # ── Secret Scanning (gitleaks) ────────────────────────
  secret-scan:
    name: Secret Scan
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    container: zricethezav/gitleaks:latest
    steps:
      - uses: actions/checkout@v6
      - name: Run gitleaks
        run: gitleaks detect --source . --no-git --config .gitleaks.toml

  # ── CodeQL (GitHub Advanced Security) ──────────────────
  codeql:
    name: CodeQL (${{ matrix.language }})
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality
          config-file: .github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-${{ matrix.language }}

  # ── Dependency Review (PR only) ───────────────────────
  # Requires "Dependency graph" enabled in repo Settings > Code security
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # ── Helm Lint ──────────────────────────────────────────
  helm-lint:
    name: Helm Lint
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Helm lint (default values)
        run: |
          docker run --rm -v "$PWD:/chart" -w /chart \
            alpine/helm:3.17.2 \
            lint helm/terrapod --values helm/terrapod/values.yaml
      - name: Helm lint (local dev values)
        run: |
          docker run --rm -v "$PWD:/chart" -w /chart \
            alpine/helm:3.17.2 \
            lint helm/terrapod --values helm/terrapod/values.yaml --values helm/terrapod/values-local.yaml

  # ── SAST (Semgrep) ─────────────────────────────────────
  sast:
    name: SAST
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Run Semgrep
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            semgrep/semgrep:1.117 \
            semgrep scan /src \
              --config "p/python" \
              --config "p/owasp-top-ten" \
              --config "p/secrets" \
              --config "/src/pentest/semgrep/.semgrep.yml" \
              --exclude "web/node_modules" \
              --exclude ".next" \
              --exclude "dist" \
              --exclude "alembic/versions" \
              --exclude "reports" \
              --exclude-rule "python.lang.security.insecure-hash-algorithms-md5.insecure-hash-algorithm-md5" \
              --exclude-rule "python.lang.security.audit.logging.logger-credential-leak.python-logger-credential-disclosure" \
              --sarif \
              --output "/src/semgrep-results.sarif"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  # ── Build Images ───────────────────────────────────────
  build-images:
    name: Build ${{ matrix.image }} (${{ matrix.arch }})
    needs: prepare
    if: needs.prepare.outputs.images_exist != 'true'
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, arm64]
        image: [terrapod-api, terrapod-web, terrapod-runner, terrapod-listener, terrapod-migrations]
        include:
          - image: terrapod-api
            dockerfile: docker/Dockerfile.api
          - image: terrapod-web
            dockerfile: docker/Dockerfile.web
          - image: terrapod-runner
            dockerfile: docker/Dockerfile.runner
          - image: terrapod-listener
            dockerfile: docker/Dockerfile.listener
          - image: terrapod-migrations
            dockerfile: docker/Dockerfile.migrations
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ matrix.image }}:sha-${{ needs.prepare.outputs.sha_short }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

  # ── Scan Images (Trivy) ────────────────────────────────
  scan-images:
    name: Scan ${{ matrix.image }}
    needs: [prepare, build-images]
    if: |
      always()
      && needs.build-images.result == 'success'
      && needs.prepare.outputs.images_exist != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image: [terrapod-api, terrapod-web, terrapod-runner, terrapod-listener, terrapod-migrations]
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/mattrobinsonsre/${{ matrix.image }}:sha-${{ needs.prepare.outputs.sha_short }}-amd64
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: pentest/trivy/.trivyignore
          exit-code: '1'
          limit-severities-for-sarif: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

  # ── Create Multi-Arch Manifests ────────────────────────
  create-manifests:
    name: Manifest ${{ matrix.image }}
    needs: [prepare, build-images, python-lint, frontend-lint, python-test, python-audit, npm-audit, secret-scan, codeql, helm-lint, sast, scan-images]
    if: |
      always()
      && needs.build-images.result == 'success'
      && needs.prepare.outputs.is_pr != 'true'
      && (needs.python-lint.result == 'success' || needs.python-lint.result == 'skipped')
      && (needs.frontend-lint.result == 'success' || needs.frontend-lint.result == 'skipped')
      && (needs.python-test.result == 'success' || needs.python-test.result == 'skipped')
      && (needs.python-audit.result == 'success' || needs.python-audit.result == 'skipped')
      && (needs.npm-audit.result == 'success' || needs.npm-audit.result == 'skipped')
      && (needs.secret-scan.result == 'success' || needs.secret-scan.result == 'skipped')
      && (needs.codeql.result == 'success' || needs.codeql.result == 'skipped')
      && (needs.helm-lint.result == 'success' || needs.helm-lint.result == 'skipped')
      && (needs.sast.result == 'success' || needs.sast.result == 'skipped')
      && (needs.scan-images.result == 'success' || needs.scan-images.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [terrapod-api, terrapod-web, terrapod-runner, terrapod-listener, terrapod-migrations]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          sha_short="${{ needs.prepare.outputs.sha_short }}"
          echo "Creating manifest for ${{ matrix.image }}:sha-$sha_short"
          docker buildx imagetools create -t "$REGISTRY/${{ matrix.image }}:sha-$sha_short" \
            "$REGISTRY/${{ matrix.image }}:sha-${sha_short}-amd64" \
            "$REGISTRY/${{ matrix.image }}:sha-${sha_short}-arm64"

  # ── Release ────────────────────────────────────────────
  release:
    name: Release
    needs: [prepare, create-manifests]
    if: |
      always()
      && needs.prepare.outputs.is_tag == 'true'
      && needs.prepare.result == 'success'
      && (needs.create-manifests.result == 'success' || needs.create-manifests.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag images with version
        run: |
          sha_short="${{ needs.prepare.outputs.sha_short }}"
          version="${{ needs.prepare.outputs.version }}"

          for image in terrapod-api terrapod-web terrapod-runner terrapod-listener terrapod-migrations; do
            echo "Retagging $image:sha-$sha_short -> $version + latest"
            docker buildx imagetools create \
              -t "$REGISTRY/$image:$version" \
              -t "$REGISTRY/$image:latest" \
              "$REGISTRY/$image:sha-$sha_short"
          done

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Publish Helm chart
        run: |
          version="${{ needs.prepare.outputs.version }}"
          chart_version="${version#v}"

          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

          helm package helm/terrapod --destination dist/ \
            --version "$chart_version" --app-version "$version"

          helm push "dist/terrapod-${chart_version}.tgz" "oci://$REGISTRY"

      - uses: actions/setup-go@v6
        with:
          go-version-file: provider/go.mod
          cache-dependency-path: provider/go.sum

      - name: Import GPG signing key
        id: gpg
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          fingerprint=$(gpg --with-colons --import-options show-only --import <<< "${{ secrets.GPG_PRIVATE_KEY }}" | awk -F: '/^fpr:/{print $10; exit}')
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"

      - name: Build provider binaries with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: provider
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.gpg.outputs.fingerprint }}

      - name: Generate release notes
        id: notes
        run: |
          version="${{ needs.prepare.outputs.version }}"

          prev_tag=$(git describe --tags --abbrev=0 "${version}^" 2>/dev/null || echo "")

          if [[ -n "$prev_tag" ]]; then
            range="${prev_tag}..${version}"
          else
            range="$version"
          fi

          feats="" fixes="" docs="" refactors="" tests="" chores="" others=""

          while IFS= read -r line; do
            msg=$(echo "$line" | sed -E 's/^[a-z]+(\([^)]*\))?[!]?:[[:space:]]*//')

            case "$line" in
              feat:*|feat\(*)     feats+="- ${msg}"$'\n' ;;
              fix:*|fix\(*)       fixes+="- ${msg}"$'\n' ;;
              docs:*|docs\(*)     docs+="- ${msg}"$'\n' ;;
              refactor:*|refactor\(*) refactors+="- ${msg}"$'\n' ;;
              test:*|test\(*)     tests+="- ${msg}"$'\n' ;;
              chore:*|chore\(*|ci:*|ci\(*) chores+="- ${msg}"$'\n' ;;
              *)                  others+="- ${line}"$'\n' ;;
            esac
          done < <(git log --format='%s' "$range" 2>/dev/null)

          notes=""
          [[ -n "$feats" ]] && notes+="### Features"$'\n\n'"$feats"$'\n'
          [[ -n "$fixes" ]] && notes+="### Bug Fixes"$'\n\n'"$fixes"$'\n'
          [[ -n "$docs" ]] && notes+="### Documentation"$'\n\n'"$docs"$'\n'
          [[ -n "$refactors" ]] && notes+="### Refactoring"$'\n\n'"$refactors"$'\n'
          [[ -n "$tests" ]] && notes+="### Tests"$'\n\n'"$tests"$'\n'
          [[ -n "$chores" ]] && notes+="### Maintenance"$'\n\n'"$chores"$'\n'
          [[ -n "$others" ]] && notes+="### Other Changes"$'\n\n'"$others"$'\n'

          if [[ -n "$prev_tag" ]]; then
            notes+="**Full Changelog**: https://github.com/mattrobinsonsre/terrapod/compare/${prev_tag}...${version}"$'\n'
          fi

          # Write to file to preserve newlines
          echo "$notes" > /tmp/release-notes.md

      - name: Generate SBOMs
        run: |
          version="${{ needs.prepare.outputs.version }}"

          # Install syft
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

          for image in terrapod-api terrapod-web terrapod-runner terrapod-listener terrapod-migrations; do
            echo "Generating SBOM for $image:$version"
            syft "$REGISTRY/$image:$version" -o spdx-json="dist/sbom-${image}.spdx.json"
          done

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.prepare.outputs.version }}"
          chart_version="${version#v}"

          # Generate checksums
          (cd dist && sha256sum -- *.tgz *.spdx.json > checksums.txt)

          # GoReleaser already created the release with provider binaries.
          # Update title/notes and upload remaining assets.
          gh release edit "$version" \
            --title "$version" \
            --notes-file /tmp/release-notes.md

          gh release upload "$version" \
            dist/terrapod-${chart_version}.tgz \
            dist/sbom-terrapod-api.spdx.json \
            dist/sbom-terrapod-web.spdx.json \
            dist/sbom-terrapod-runner.spdx.json \
            dist/sbom-terrapod-listener.spdx.json \
            dist/sbom-terrapod-migrations.spdx.json \
            dist/checksums.txt \
            --clobber

  # ── Cleanup Tag on Failure ─────────────────────────────
  cleanup-tag:
    name: Cleanup Tag
    needs: [prepare, build-images, scan-images, create-manifests, release]
    if: |
      always()
      && needs.prepare.outputs.is_tag == 'true'
      && (needs.build-images.result == 'failure' || needs.scan-images.result == 'failure' || needs.create-manifests.result == 'failure' || needs.release.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Delete tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.prepare.outputs.version }}"
          echo "Cleaning up failed release $version"

          gh release delete "$version" --cleanup-tag --yes 2>/dev/null || true
          git push origin ":refs/tags/$version" 2>/dev/null || true

  # ── Gate ───────────────────────────────────────────────
  ci-pass:
    name: CI
    if: always()
    needs:
      - prepare
      - python-lint
      - frontend-lint
      - provider-lint
      - provider-test
      - python-test
      - python-audit
      - npm-audit
      - secret-scan
      - codeql
      - dependency-review
      - helm-lint
      - sast
      - build-images
      - scan-images
      - create-manifests
      - release
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=(
            "${{ needs.prepare.result }}"
            "${{ needs.python-lint.result }}"
            "${{ needs.frontend-lint.result }}"
            "${{ needs.provider-lint.result }}"
            "${{ needs.provider-test.result }}"
            "${{ needs.python-test.result }}"
            "${{ needs.python-audit.result }}"
            "${{ needs.npm-audit.result }}"
            "${{ needs.secret-scan.result }}"
            "${{ needs.codeql.result }}"
            "${{ needs.dependency-review.result }}"
            "${{ needs.helm-lint.result }}"
            "${{ needs.sast.result }}"
            "${{ needs.build-images.result }}"
            "${{ needs.scan-images.result }}"
            "${{ needs.create-manifests.result }}"
            "${{ needs.release.result }}"
          )

          for r in "${results[@]}"; do
            if [[ "$r" == "failure" ]]; then
              echo "One or more jobs failed"
              exit 1
            fi
          done
          echo "All checks passed"
