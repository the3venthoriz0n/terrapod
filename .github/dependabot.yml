version: 2
updates:
  - package-ecosystem: pip
    directory: /services
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, python]
    commit-message:
      prefix: "deps(python):"
    ignore:
      # fastapi 0.137 pulls starlette 1.x (major) — it refactors
      # include_router (the new _IncludedRouter matcher) and shifts
      # several Starlette behaviours. Hold until a dedicated migration
      # PR with a full smoke pass; revisit then.
      - dependency-name: fastapi
        versions: [">=0.137"]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, web]
    commit-message:
      prefix: "deps(web):"
    ignore:
      # eslint-plugin-react (via eslint-config-next) doesn't support ESLint 10 yet
      - dependency-name: eslint
        versions: [">=10"]
      # @zxcvbn-ts/language-common v4 ships compressed dictionaries that
      # require @zxcvbn-ts/core@4 + @zxcvbn-ts/dictionary-compression;
      # core is pinned at ^3.0.4. Hold until the coordinated v4 upgrade.
      - dependency-name: "@zxcvbn-ts/language-common"
        versions: [">=4"]

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]
    commit-message:
      prefix: "deps(docker):"
    ignore:
      - dependency-name: node
        versions: ["23.x", "25.x", "27.x", "29.x", "31.x"]
      # Python 3.14+ — pinned at 3.13 deliberately (v0.32.0 downgrade
      # cleared CVEs and several runtime deps aren't 3.14-ready). Until
      # the ecosystem catches up we don't want dependabot re-suggesting
      # the bump every week.
      - dependency-name: python
        versions: ["3.14.x", "3.15.x"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, ci]
    commit-message:
      prefix: "deps(ci):"
