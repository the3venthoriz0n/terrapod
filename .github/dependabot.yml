version: 2
updates:
  - package-ecosystem: pip
    directory: /services
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, python]
    commit-message:
      prefix: "deps(python):"

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, web]
    commit-message:
      prefix: "deps(web):"
    ignore:
      # eslint-plugin-react (via eslint-config-next) doesn't support ESLint 10 yet
      - dependency-name: eslint
        versions: [">=10"]

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]
    commit-message:
      prefix: "deps(docker):"
    ignore:
      - dependency-name: node
        versions: ["23.x", "25.x", "27.x", "29.x", "31.x"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, ci]
    commit-message:
      prefix: "deps(ci):"
